<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملف الإنجاز المهني | ندى المجيرش</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@500;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Cairo', 'sans-serif'], heading: ['Tajawal', 'sans-serif'] },
                    colors: { navy: '#0F172A', navyLight: '#1E293B', gold: '#C5A059', bglight: '#F8FAFC' }
                }
            }
        }
    </script>
    <style>
        body { background-color: #ffffff; color: #1e293b; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        @page { size: A4; margin: 15mm; }
        .page-break { page-break-before: always; }
        .avoid-break { break-inside: avoid; page-break-inside: avoid; }
        .cover-page { height: 260mm; display: flex; flex-direction: column; justify-content: center; }
        a { text-decoration: none !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const portfolioData = [
            {
                section: "أولاً: البيانات الأساسية والرؤية",
                items: [
                    { 
                        title: "السيرة الذاتية والتوجه المهني", 
                        concept: "معلمة فيزياء للمرحلة الثانوية بمدارس التربية النموذجية. أمتلك شغفاً حقيقياً بتطوير البيئة التعليمية ودمج التقنية بالتعليم. مؤسسة منصة 'أثر' المعتمدة على الذكاء الاصطناعي.",
                        links: [
                            { label: "الرخصة المهنية", url: "https://nda25.github.io/Project1/nada.pdf" },
                            { label: "وثيقة الرؤية والرسالة", url: "https://nda25.github.io/Project1/vision_mission.pdf" }
                        ] 
                    }
                ]
            },
            {
                section: "ثانياً: التخطيط والإعداد المسبق",
                items: [
                    { 
                        title: "الخطط الفصلية واليومية", 
                        concept: "تصميم خطط مرنة ومحكمة تشمل التوزيع الفصلي للمنهج والخطط الأسبوعية المبنية على مستويات بلوم المعرفية، مع إعداد خطط بديلة للطوارئ.",
                        links: [
                            { label: "توزيع الفصل الأول", url: "https://nda25.github.io/Project1/dd.pdf" },
                            { label: "توزيع الفصل الثاني", url: "https://nda25.github.io/Project1/cc.pdf" },
                            { label: "الخطة التفصيلية للدروس", url: "https://nda25.github.io/Project1/Plan.pdf" },
                            { label: "خطة مهارات التفكير العليا", url: "https://drive.google.com/drive/folders/180Io-M2v3fBxzMythe4Dlxycw8nN9tnH" },
                            { label: "شواهد تفعيل حصص الاحتياط", url: "https://drive.google.com/drive/folders/1NVXdT20YX2Or6d0USSC1Mzip41l6ksf2" }
                        ]
                    }
                ]
            },
            {
                section: "ثالثاً: التقويم وأدوات القياس",
                items: [
                    { 
                        title: "الاختبارات وأوراق العمل", 
                        concept: "بناء أدوات تقويم متنوعة وموضوعية تقيس مدى تحقق نواتج التعلم بدقة، وتشمل اختبارات دورية وأوراق عمل تفاعلية تراعي الفروق الفردية بين الطالبات.",
                        links: [
                            { label: "نموذج اختبار (1)", url: "test1.pdf" },
                            { label: "نموذج اختبار (2)", url: "test2.pdf" },
                            { label: "تقرير مراعاة الفروق الفردية", url: "https://nda25.github.io/Project1/individual_diff.pdf" },
                            { label: "تقييم الطالبات لأنفسهم (تأمل ذاتي)", url: "https://drive.google.com/drive/folders/166FyHf1F4DmmIu3BwyAe-VlfPc4m75yc" }
                        ]
                    }
                ]
            },
            {
                section: "رابعاً: إنجازات وأعمال الطالبات",
                items: [
                    { 
                        title: "المشاريع والبحوث العلمية", 
                        concept: "الارتقاء بدور الطالبة لتكون باحثة ومنتجة للمعرفة من خلال تكليفها بمشاريع علمية، أبحاث رصينة، وتصميم خرائط مفاهيم تلخص الدروس المعقدة.",
                        links: [
                            { label: "مشاريع الطالبات العلمية", url: "https://drive.google.com/drive/folders/1-4pthTfiLT4NkEIDmB0CAxCUIQiXfhoU" },
                            { label: "خرائط مفاهيم (أعمال الطالبات)", url: "https://drive.google.com/drive/folders/1BG12LoQPLdLzqp85pt1MsnDJgPi98Ynn" },
                            { label: "أبحاث الطالبات المعتمدة", url: "https://drive.google.com/drive/folders/1MkY9Zf_SrFEWRzH7IDQB3QmF-Dp_2zIe" },
                            { label: "تجارب وشرح الطالبات", url: "https://drive.google.com/drive/folders/12NXTdmhSWuTW6TvjOnhGZZ_ieedcEhZo" }
                        ] 
                    }
                ]
            },
            {
                section: "خامساً: الأنشطة والفعاليات (المنهجية واللامنهجية)",
                items: [
                    { 
                        title: "الرحلات، المسابقات، والتطوع", 
                        concept: "دمج المتعلمات في خبرات حية تنمي المسؤولية المجتمعية والوطنية، وتأهيلهن للمشاركة في مسابقات عالمية ومبادرات تطوعية.",
                        links: [
                            { label: "زيارة مدينة الملك عبدالعزيز للعلوم والتقنية", url: "https://drive.google.com/drive/folders/1Jyjape3y7dyTEQN3o6LwMSGtswb0rGIl" },
                            { label: "شهادات المشاركة بمسابقة (WAICY)", url: "https://drive.google.com/drive/folders/1rxBTVJ8XGidiWpI0p-sVZe5TOpFOlbNi" },
                            { label: "شواهد الربط بالوطن (رؤية 2030)", url: "https://drive.google.com/drive/folders/1h0tFn1_p_9ZcFO9XSHS9GfDLY644ytpl" },
                            { label: "مبادرات العمل التطوعي (كسوة الشتاء)", url: "https://drive.google.com/drive/folders/1kablG2gj-3EgqqEiyzslHJZwmXwVTRFC" }
                        ] 
                    }
                ]
            },
            {
                section: "سادساً: المبادرات والابتكارات التربوية",
                items: [
                    { 
                        title: "منصة أثر والمحاكاة الرقمية", 
                        concept: "ابتكار حلول تقنية مثل (منصة أثر) المعتمدة على الذكاء الاصطناعي، وتوظيف استراتيجية المحاكاة الرقمية (PhET) لتبسيط مفاهيم الفيزياء.",
                        links: [
                            { label: "تقرير مبادرة منصة (أثر)", url: "https://nda25.github.io/Project1/athar_report.pdf" },
                            { label: "تقرير حقيبة ألعاب كانفا", url: "https://nda25.github.io/Project1/canva_report.pdf" },
                            { label: "شواهد تطبيق المحاكاة (PhET)", url: "https://drive.google.com/drive/folders/18QlC7a2q_2Z9p1M6ZKHdSOXosGm9dK95" },
                            { label: "حوكمة وفهرس معمل الفيزياء", url: "https://drive.google.com/drive/folders/15zqvdJVEFKhfcfu5UJ2skR14o7wS1rqD" }
                        ]
                    }
                ]
            },
            {
                section: "سابعاً: النمو المهني والتطوير",
                items: [
                    { 
                        title: "الدورات، مجتمعات التعلم، والتأمل الذاتي", 
                        concept: "الاستمرارية في التنمية المهنية من خلال حضور الدورات، تفعيل مجتمعات التعلم المهنية (PLC)، وتحديد الاحتياجات التدريبية بشكل منهجي.",
                        links: [
                            { label: "سجل الدورات وكشوفات الحضور", url: "https://drive.google.com/drive/folders/1xya-WXw4wqnmvEluEnV44HTmXL0ANHvf" },
                            { label: "خطة التطوير المهني", url: "https://nda25.github.io/Project1/pd_plan.pdf" },
                            { label: "تقرير مجتمعات التعلم (PLC)", url: "https://nda25.github.io/Project1/plc_report.pdf" },
                            { label: "استمارة الزيارة التبادلية", url: "https://nda25.github.io/Project1/peer_visit.pdf" },
                            { label: "استمارة تحديد الاحتياجات والتأمل", url: "https://nda25.github.io/Project1/needs_assessment.pdf" }
                        ] 
                    }
                ]
            },
            {
                section: "ثامناً: الآراء وتقييم الأداء",
                items: [
                    { 
                        title: "استطلاع المستفيدين والتقييم الإداري", 
                        concept: "قياس مؤشرات الرضا لتوظيف التغذية الراجعة من الطالبات والأولياء في تحسين الأداء، بالإضافة لتحليل نتائج الأداء الوظيفي السنوي.",
                        links: [
                            { label: "نتائج استطلاع المستفيدين (الآراء)", url: "https://nda25.github.io/Project1/survey.pdf" },
                            { label: "دراسة تحليل الأداء الوظيفي", url: "https://nda25.github.io/Project1/analysis_report.pdf" },
                            { label: "تقييم الأداء السنوي (العام الماضي)", url: "https://nda25.github.io/Project1/eval_last_year.pdf" },
                            { label: "تقييم الأداء (العام الحالي 100%)", url: "https://nda25.github.io/Project1/eval_this_year.pdf" },
                            { label: "الخطة الإجرائية للتحسين", url: "https://nda25.github.io/Project1/action_plan.pdf" }
                        ] 
                    }
                ]
            }
        ];

        function TeacherPortfolio() {
            return (
                <div className="bg-white min-h-screen font-sans text-navy">
                    
                    {/* صفحة الغلاف */}
                    <div className="cover-page text-center relative border-8 border-double border-gold/20 p-10 m-4 rounded-3xl">
                        <div className="absolute top-10 left-10 right-10 flex justify-between">
                            <img src="https://f.top4top.io/p_37235mo091.png" alt="شعار المدارس" className="h-16 lg:h-20 object-contain" />
                            <img src="https://k.top4top.io/p_37234u2y41.png" alt="شعار الشركة" className="h-16 lg:h-20 object-contain" />
                        </div>
                        
                        <div className="mt-32">
                            <h2 className="font-heading text-4xl lg:text-5xl font-black text-navy mb-6">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</h2>
                            <div className="w-24 h-2 bg-gold mb-10 mx-auto rounded-full"></div>
                            
                            <h1 className="font-heading text-4xl lg:text-5xl font-bold text-navyLight mb-8">ملف الإنجاز المهني</h1>
                            
                            <div className="bg-bglight p-8 rounded-2xl border border-gray-200 shadow-sm max-w-3xl mx-auto mb-16">
                                <h4 className="text-xl font-bold text-navyLight mb-2">إعداد المعلمة</h4>
                                <h2 className="text-3xl font-black text-navy mb-4">ندى محمد المجيرش</h2>
                                <p className="text-lg font-bold text-gray-600">معلمة فيزياء - المرحلة الثانوية | NE231009</p>
                            </div>
                            
                            <p className="text-base lg:text-lg font-semibold text-gray-700 leading-relaxed max-w-4xl mx-auto px-6 mb-12">
                                يعكس هذا الملف جهودي وممارساتي التربوية داخل وخارج الغرفة الصفية، ويوثق التخطيط، والتقويم، وأعمال الطالبات، والابتكارات التقنية، والنمو المهني المستمر بما يخدم العملية التعليمية ويرفع من جودة المخرجات.
                            </p>
                        </div>
                    </div>

                    {/* صفحات المحتوى (كل مجال في صفحة) */}
                    <div className="max-w-4xl mx-auto px-6 py-10">
                        {portfolioData.map((category, idx) => (
                            <div key={idx} className="page-break">
                                
                                {/* ترويسة القسم */}
                                <div className="border-b-4 border-gold pb-4 mb-8 flex items-center justify-between">
                                    <h2 className="font-heading text-2xl lg:text-3xl font-black text-navy">{category.section}</h2>
                                    <span className="text-sm font-bold text-gray-500">ملف إنجاز المعلمة | ندى المجيرش</span>
                                </div>
                                
                                <div className="space-y-10">
                                    {category.items.map((item, itemIdx) => (
                                        <div key={itemIdx} className="avoid-break">
                                            
                                            {/* عنوان البند */}
                                            <div className="flex items-center gap-3 mb-4">
                                                <h3 className="font-heading text-2xl font-bold text-navyLight border-r-4 border-gold pr-3">{item.title}</h3>
                                            </div>
                                            
                                            {/* الوصف */}
                                            <div className="mb-6">
                                                <p className="text-base text-gray-700 leading-relaxed bg-bglight p-4 rounded-xl border border-gray-100">{item.concept}</p>
                                            </div>
                                            
                                            {/* الشواهد والروابط */}
                                            <div>
                                                <h4 className="text-sm font-bold text-gray-500 mb-3">الشواهد والمرفقات (اضغط للفتح):</h4>
                                                <ul className="flex flex-wrap gap-x-4 gap-y-3 list-none p-0 m-0">
                                                    {item.links.map((link, i) => (
                                                        <li key={i}>
                                                            <a href={link.url} target="_blank" className="bg-white border border-gray-200 text-navy px-4 py-2 rounded-lg text-sm font-bold shadow-sm hover:border-gold hover:text-gold transition-colors inline-flex items-center gap-2">
                                                                <svg className="w-4 h-4 text-gold" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                                                                {link.label}
                                                            </a>
                                                        </li>
                                                    ))}
                                                </ul>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TeacherPortfolio />);
    </script>
</body>
</html>
