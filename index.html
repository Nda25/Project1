    <div id="root"></div>

    <script type="text/babel">

            {

                        application: "الريادة في تقديم تعليم فيزيائي متمحور حول الطالبة، يبني مهارات البحث والابتكار، ويُعد جيلاً مفكراً قادراً على قيادة ذاته ووطنه بمسؤولية، معتزاً بهويته وتراثه الأصيل، ليكون جزءاً من مرجعية وطنية رائدة.", 
                        links: [{ label: "وثيقة الرؤية المعتمدة", url: "vision_mission.pdf" }]

                    { 
                        id: "2.2", title: "الرسالة والأهداف المحددة",

                        application: "خلق بيئة تعليمية تشاركية وآمنة في حصص الفيزياء، تعتمد على التطوير المستدام وتوظيف التقنية (مثل منصة أثر) لتخطي التوقعات. التزم بترسيخ الانضباط، والعمل الجماعي، والشفافية لبناء شخصية الطالبة علمياً ومهارياً بما يضمن تحقيق نواتج تعلم عالية الجودة.", 
                        links: [{ label: "وثيقة الرسالة المعتمدة", url: "vision_mission.pdf" }] 
                    }
                ]
            },
            {
                section: "التخطيط والأنظمة",
                items: [
                    { 
                        id: "2.3", title: "خطة العمل المرنة", 
                        concept: "تصميم خطة تشغيلية مرنة تستوعب المتغيرات الطارئة، وتتوافق تماماً مع الخطة الاستراتيجية للمدارس.",
                        application: "بناء خطة متعددة الأبعاد تشمل التوزيع الفصلي للمنهج والخطط الأسبوعية التفصيلية المبنية على مستويات بلوم، وتتكامل مع خطة 'نفكر بعمق' لمهارات التفكير العليا. ولضمان المرونة المطلوبة، تم إعداد خطط بديلة لتفعيل حصص الاحتياط لضمان استمرارية التعلم وعدم هدر الوقت.", 
                        links: [

                        application: "تم رصد ومعالجة مشكلات رئيسية: (1) هدر وقت المعلمات في التخطيط: عولج بابتكار منصة 'أثر' المعتمدة على الذكاء الاصطناعي لتوليد الاستراتيجيات. (2) فوضى حصص الاحتياط: عولج بتصميم 'حقيبة ألعاب كانفا' التفاعلية. (3) صعوبة المفاهيم المجردة: عولجت بتطبيق تدريس الأقران وتفعيل التقييم الذاتي.", 
                        links: [
                            { label: "تقرير منصة أثر.pdf", url: "athar_report.pdf" },
                            { label: "تقرير حقيبة كانفا.pdf", url: "canva_report.pdf" },
                            { label: "تقييم الطالبات لأنفسهم", url: "https://drive.google.com/drive/folders/166FyHf1F4DmmIu3BwyAe-VlfPc4m75yc" },
                            { label: "فيديو تدريس الأقران (YouTube)", url: "https://youtu.be/w9B5sYzYrlE?si=fAotddWFnHQypqmb" }
                        ]
                    },
                    { 
                        id: "2.5", title: "توظيف البحوث والدراسات", 
                        concept: "الاستناد إلى المرجعيات العلمية والأبحاث التربوية الموثوقة لتطوير الممارسات الصفية وتحسين نواتج التعلم.",
                        application: "تطبيق استراتيجية الاستقصاء المبني على المحاكاة الرقمية (SBI) استناداً إلى دراسات مشروع PhET (جامعة كولورادو)، وذلك لتصحيح المفاهيم الفيزيائية البديلة لدى الطالبات وتعميق الفهم عبر التجريب التفاعلي.", 
                        links: [{ label: "تقرير توظيف البحوث.pdf", url: "ff.pdf" }] 
                    }
                ]
            },
            {
                section: "النمو المهني والشراكات",
                items: [
                    { 
                        id: "2.6", title: "التفاعل مع مجتمعات التعلم", 
                        concept: "العمل التشاركي مع زميلات التخصص لتحليل المناهج ومعالجة الفجوة بين النظريات الفيزيائية المجردة وتطبيقاتها في سوق العمل.",
                        application: "تفعيل مجتمعات التعلم المهنية (PLC) بشكل أسبوعي لدمج منحى (STEM) والتعلم القائم على المشاريع (PBL). أثمرت الاجتماعات عن توجيه الطالبات لتنفيذ نماذج ومشاريع تحاكي تخصصات دقيقة كالفيزياء الطبية، الهندسة المعمارية، وفيزياء الكم.", 
                        links: [
                            { label: "تقرير مجتمعات التعلم PLC.pdf", url: "plc_report.pdf" },

                        ] 
                    },
                    { 
                        id: "2.7", title: "تحديد الاحتياجات التدريبية",

                        application: "بناء خطة تطوير مهني شاملة لعام 1447هـ، تركز على مجالات نوعية تشمل: تطبيقات الذكاء الاصطناعي التوليدي في الفيزياء، المعامل الافتراضية والواقع المعزز (AR)، استراتيجيات تقويم مشاريع STEM، وقيادة مجتمعات التعلم المهنية (PLC).", 
                        links: [{ label: "خطة التطوير المهني.pdf", url: "pd_plan.pdf" }] 
                    },
                    { 
                        id: "2.8", title: "حضور البرامج التدريبية", 
                        concept: "الاستمرارية في النمو المعرفي واكتساب مهارات تدريسية وتقنية حديثة.",
                        application: "حضور دورات وبرامج متخصصة مكثفة خلال الفصل الحالي تنعكس مباشرة على جودة الأداء الصفي.", 
                        links: [{ label: "سجل الدورات (الفصل الحالي)", url: "https://drive.google.com/drive/folders/1xya-WXw4wqnmvEluEnV44HTmXL0ANHvf" }] 
                    }
                ]
            },
            {
                section: "قياس الأثر (الإدارة)",

                        application: "توزيع استبانات دورية للمتعلمين وأولياء الأمور، وتحليل النتائج لرفع مستوى الرضا وتحسين المخرجات.", 
                        links: [{ label: "استبانة_المستفيدين.pdf", url: "استبانة_المستفيدين.pdf" }] 
                    },
                    { 
                        id: "2.10", title: "تحليل الأداء الوظيفي وتوظيفه", 
                        concept: "التقييم الذاتي والمؤسسي لتحديد نقاط القوة وفرص التحسين المستمر.",
                        application: "إعداد دراسة تحليلية لنتائج الأداء الوظيفي، وبناء خطة إجرائية لمعالجة الملاحظات وتطوير نقاط القوة بشكل مستدام.", 
                        links: [
                            { label: "التحليل_السنوي.pdf", url: "التحليل_السنوي.pdf" },
                            { label: "الخطة_الاجرائية.pdf", url: "الخطة_الاجرائية.pdf" }
                        ] 
                    }
                ]
            },
            {
                section: "المكتبات والمبادرات",
                items: [
                    {

                        application: "تحفيز الطالبات للبحث الموجه في المكتبات الرقمية وبوابة عين لإنتاج أبحاث علمية رصينة (مثل: قوانين نيوتن، بوز أينشتاين).", 
                        links: [
                            { label: "تقرير تفعيل مصادر التعلم.pdf", url: "activ.pdf" },
                            { label: "أبحاث الطالبات المعتمدة", url: "https://drive.google.com/drive/folders/1MkY9Zf_SrFEWRzH7IDQB3QmF-Dp_2zIe" }
                        ] 
                    },
                    { 
                        id: "2.13", title: "التخطيط في ضوء نتاجات التعلم", 
                        concept: "مواءمة البيئة التعليمية مع النتاجات المستهدفة لتسهيل التطبيق العملي.",
                        application: "مبادرة حوكمة وتنظيم المعمل الفيزيائي: تصميم نظام أرشفة رقمي وجرد ذكي للأدوات لتسريع الوصول وتقليل الهدر.", 
                        links: [{ label: "تقرير وفهرس المعمل", url: "https://drive.google.com/drive/folders/15zqvdJVEFKhfcfu5UJ2skR14o7wS1rqD" }] 
                    }
                ]
            },
            {
                section: "تقييم اللجنة الفرعية",
                items: [
                    {

                        concept: "الابتعاد عن التلقين وتفعيل استراتيجيات تضمن المشاركة والفهم العميق.",
                        application: "استخدام استراتيجيات نشطة مثل الاستقصاء المبني على المحاكاة والخرائط المفاهيمية.", 
                        links: [{ label: "بطاقات الاستراتيجيات والدروس", url: "https://drive.google.com/drive/folders/1oGDnB3IhAbMBEPHvg4dZbLriOPWrj8-T" }] 
                    },
                    { 
                        id: "2.15", title: "ربط المادة بالمواد الأخرى", 
                        concept: "إظهار تكامل العلوم وربط المفاهيم الفيزيائية بالواقع الهندسي والطبي.",
                        application: "توجيه الطالبات لإنتاج مشاريع علمية تدمج الفيزياء بالهندسة والتقنية (مثل مشروع الفيزياء النووية).", 
                        links: [{ label: "مشاريع الطالبات العلمية", url: "https://drive.google.com/drive/folders/1-4pthTfiLT4NkEIDmB0CAxCUIQiXfhoU" }] 
                    },
                    { 
                        id: "2.16", title: "تبسيط المعلومات",

                    { 
                        id: "2.17", title: "توظيف الأنشطة التعليمية",

                    },
                    { 
                        id: "2.18", title: "خبرات صفية ولا صفية",

                        application: "تفعيل المختبر المرئي وتدريس الأقران لدمج الطالبات عملياً في شرح وتوثيق التجارب.", 
                        links: [{ label: "تجارب وشرح الطالبات", url: "https://drive.google.com/drive/folders/12NXTdmhSWuTW6TvjOnhGZZ_ieedcEhZo" }] 
                    },
                    { 
                        id: "2.19", title: "الإلمام بالفروق الفردية", 
                        concept: "تصميم التدريس ليتوافق مع تنوع مستويات وأنماط تعلم الطالبات.",
                        application: "توفير مهام متفاوتة التحدي وتخصيص أنشطة إثرائية وأخرى علاجية ضمن خطة 'نفكر بعمق'.",

                        id: "2.20", title: "تقديم برامج تدريبية", 
                        concept: "نقل الأثر والخبرة المهنية للزميلات في التخصص والمدرسة.",
                        application: "إعداد وتقديم ورش عمل تطبيقية متخصصة كدورة الذكاء الاصطناعي في كانفا.", 
                        links: [{ label: "البرامج المقدمة", url: "https://drive.google.com/drive/folders/1EfBIqZW5_pwEjZFMVG7rWWMJA2To7Gdw" }] 
                    }
                ]
            }
        ];

        function Portfolio() {
            const [activeItem, setActiveItem] = useState(null);
            const [isMenuOpen, setIsMenuOpen] = useState(false);

            const handleItemClick = (e, item) => {
                e.preventDefault();
                e.stopPropagation();
                setActiveItem(item);
                setIsMenuOpen(false);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            return (
                <div className="min-h-screen bg-bglight font-sans text-navy">
                    
                    <button 
                        type="button"
                        onClick={() => setIsMenuOpen(!isMenuOpen)}
                        className="md:hidden fixed bottom-6 right-6 z-[60] bg-gold text-white p-4 rounded-full shadow-2xl"
                    >
                        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    </button>

                    {isMenuOpen && (
                        <div className="fixed inset-0 bg-black/50 z-40 md:hidden" onClick={() => setIsMenuOpen(false)}></div>
                    )}

                    <aside className={`fixed inset-y-0 right-0 z-50 w-64 lg:w-80 bg-navy text-white flex flex-col transition-transform duration-300 ease-in-out ${isMenuOpen ? 'translate-x-0' : 'translate-x-full'} md:translate-x-0 shadow-2xl border-l border-white/5`}>
                        <div className="p-5 text-center border-b border-white/10 bg-navyLight">
                            <h2 className="font-heading text-xl font-black text-gold mb-1">المجال الثاني</h2>
                            <p className="text-xs font-bold opacity-80">الجودة والإنتاجية</p>
                        </div>
                        <nav className="flex-1 overflow-y-auto p-4">
                            
                            <button 
                                type="button"
                                onClick={() => {setActiveItem(null); setIsMenuOpen(false); window.scrollTo({ top: 0, behavior: 'smooth' });}}
                                className={`w-full text-right flex items-center gap-3 py-3 px-4 mb-6 text-sm font-bold rounded-lg transition-all duration-200 outline-none ${activeItem === null ? 'bg-gold text-navy shadow-md' : 'bg-white/5 text-gold hover:bg-white/10'}`}
                            >
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                                المقدمة الرئيسية
                            </button>

                            <div className="space-y-6">
                                {portfolioData.map((category, idx) => (
                                    <div key={idx} className="mb-2">
                                        <h3 className="text-gold font-bold mb-3 text-sm uppercase px-2">{category.section}</h3>
                                        <ul className="space-y-1.5 pr-2 border-r-2 border-white/10">
                                            {category.items.map((item) => {
                                                const isActive = activeItem?.id === item.id;
                                                return (
                                                    <li key={item.id}>
                                                        <button 
                                                            type="button"
                                                            onClick={(e) => handleItemClick(e, item)}
                                                            className={`w-full text-right flex items-start gap-2 py-2.5 px-3 text-sm font-semibold rounded-lg transition-all duration-200 outline-none ${isActive ? 'bg-white/10 text-gold shadow-sm' : 'text-gray-300 hover:text-white hover:bg-white/5'}`}
                                                        >
                                                            <span className={`shrink-0 py-0.5 px-1.5 rounded text-xs font-black mt-0.5 ${isActive ? 'bg-gold text-navy' : 'bg-transparent text-gold'}`}>{item.id}</span>
                                                            <span className="flex-1 leading-snug">{item.title}</span>
                                                        </button>
                                                    </li>
                                                )
                                            })}
                                        </ul>
                                    </div>
                                ))}
                            </div>
                        </nav>
                    </aside>

                    <main className="md:mr-64 lg:mr-80 min-h-screen flex flex-col transition-all duration-300">
                        
                        <header className="bg-white p-3 md:p-4 shadow-sm border-b-2 border-gold sticky top-0 z-30">
                            <div className="max-w-4xl mx-auto flex flex-row justify-between items-center gap-2">
                                <img src="https://b.top4top.io/p_3603wgsjg1.png" alt="شعار المدارس" className="h-10 md:h-12 object-contain" />
                                <div className="text-center flex-1">
                                    <h1 className="font-heading text-xl md:text-2xl font-black text-navy mb-0.5">ندى محمد المجيرش</h1>
                                    <p className="text-xs md:text-sm font-bold text-gray-600 flex justify-center items-center gap-2 flex-wrap">
                                        معلمة فيزياء - المرحلة الثانوية
                                        <span className="hidden md:inline text-gray-300">|</span>
                                        <span className="text-gold">NE231009</span>
                                    </p>
                                </div>
                                <img src="https://k.top4top.io/p_359656o321.png" alt="شعار الشركة" className="h-10 md:h-12 object-contain" />
                            </div>
                        </header>

                        <div className="p-4 md:p-8 w-full max-w-4xl mx-auto flex-1 flex flex-col justify-center">
                            
                            {activeItem === null ? (
                                <div className="fade-in bg-white rounded-3xl shadow-2xl border-t-4 border-gold overflow-hidden flex flex-col p-8 md:p-12 text-center items-center justify-center min-h-[60vh] relative">
                                    
                                    <h2 className="font-heading text-2xl md:text-4xl font-black text-navy mb-6 z-10">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</h2>
                                    <div className="w-24 h-1.5 bg-gold mb-8 mx-auto rounded-full z-10"></div>
                                    <h3 className="font-heading text-xl md:text-2xl font-bold text-navyLight mb-6 z-10">ملف الإنجاز المهني - مسار الجودة والإنتاجية</h3>
                                    
                                    <p className="text-gray-700 text-base md:text-lg leading-loose max-w-3xl mx-auto mb-10 z-10 font-semibold text-justify" style={{textAlignLast: "center"}}>
                                        الحمد لله الذي علَّم بالقلم، علَّم الإنسان ما لم يعلم، وأسبغ علينا نعمه ظاهرةً وباطنة. والصلاة والسلام على خير من علَّم البشرية وأرشدها إلى طريق الحق والهدى، نبينا محمد صلى الله عليه وسلم، وعلى آله وصحبه أجمعين.
                                        <br/><br/>
                                        إنَّ هذا الملف هو حصيلة جهدٍ وعطاءٍ متواصل، جمعتُ فيه ثمار عملي، وخلاصة خبرتي، وما تحقق من إنجازات خلال مسيرتي. أسأل الله أن يجعل ما قدمت خالصًا لوجهه الكريم، وأن يكون شاهدًا على الإخلاص والعمل، وخطوة نحو مزيدٍ من التطوير والتميز.
                                    </p>
                                    
                                    <div className="bg-navy text-white px-6 py-4 rounded-xl inline-flex items-center justify-center gap-3 z-10 shadow-lg mt-4">
                                        <svg className="w-6 h-6 text-gold animate-bounce" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"></path></svg>
                                        <p className="font-bold text-sm md:text-base">الرجاء اختيار أحد البنود من القائمة الجانبية لاستعراض الشواهد</p>
                                    </div>
                                </div>
                            ) : (
                                <div key={activeItem.id} className="fade-in bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden flex flex-col">
                                    
                                    <div className="bg-navy p-5 text-white flex justify-between items-center border-b-4 border-gold">
                                        <span className="font-black text-lg bg-white/10 px-4 py-1.5 rounded-lg">البند {activeItem.id}</span>
                                        <h2 className="font-heading text-xl md:text-2xl font-bold text-right ml-2">{activeItem.title}</h2>
                                    </div>
                                    
                                    <div className="p-6 md:p-8 space-y-8 flex-1">
                                        <div>
                                            <h3 className="text-base font-black text-gold mb-3 flex items-center gap-2">
                                                <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"></path><path fillRule="evenodd" d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3zm-3 4a1 1 0 100 2h.01a1 1 0 100-2H7zm3 0a1 1 0 100 2h3a1 1 0 100-2h-3z" clipRule="evenodd"></path></svg>
                                                المفهوم / الهدف
                                            </h3>
                                            <p className="text-gray-700 text-base font-semibold leading-relaxed bg-bglight p-5 rounded-xl border border-gray-100 shadow-sm">{activeItem.concept}</p>
                                        </div>
                                        
                                        <div>
                                            <h3 className="text-base font-black text-navyLight mb-3 flex items-center gap-2">
                                                <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M11.3 1.046A12.014 12.014 0 0010.3 1 12.015 12.015 0 009.29 1.046..."></path><path d="M19.342 9.406c..."></path><path fillRule="evenodd" d="M10 2a8 8 0 100 16 8 8 0 000-16zm-1 9V6a1 1 0 112 0v4h2a1 1 0 110 2h-3a1 1 0 01-1-1z" clipRule="evenodd"></path></svg>
                                                آلية التطبيق
                                            </h3>
                                            <p className="text-gray-600 text-base leading-relaxed p-2">{activeItem.application}</p>
                                        </div>
                                    </div>

                                    <div className="bg-gray-50 p-6 border-t border-gray-100 flex flex-wrap gap-3">
                                        {activeItem.links.map((link, i) => (
                                            <a key={i} href={link.url} target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-2 bg-white border border-gray-200 text-navy hover:bg-gold hover:text-white hover:border-gold px-4 py-2.5 rounded-lg shadow-sm text-sm font-bold transition-all duration-200">
                                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                                                {link.label}
                                            </a>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>

                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Portfolio />);
    </script>
</body>
</html>
