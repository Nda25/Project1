                                <h2 className="text-6xl font-black text-brand-navy mb-6">ندى محمد المجيرش</h2>
                                <div className="h-px bg-gradient-to-r from-transparent via-brand-gold to-transparent w-full mb-6"></div>
                                <p className="text-2xl font-bold text-brand-navy/80">معلمة فيزياء وهندسة</p>
                                <p className="text-lg font-black text-brand-gold mt-2">الرقم الوظيفي: NE231009</p>
                            </div>

                            <div className="mt-auto">
                                <p className="text-brand-navy/40 font-black text-2xl italic font-quran">"نحو تعليم مبتكر يبني أجيال المستقبل"</p>
                            </div>
                        </div>
                    </div>

                    {/* صفحة المقدمة */}
                    <div className="page-container relative">
                        <div className="artistic-bg">
                            <div className="bg-shape-1 opacity-50"></div>
                            <div className="pattern-overlay"></div>
                        </div>
                        
                        <div className="relative z-10">
                            <div className="flex items-center gap-6 mb-16">
                                <div className="icon-circle">
                                    <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                                </div>
                                <h2 className="font-heading text-5xl font-black text-brand-navy">مقدمة الملف</h2>
                            </div>

                            <div className="glass-card p-12 leading-[2.2] text-gray-700 text-2xl shadow-2xl border-r-8 border-brand-gold">
                                <p className="mb-10 font-bold text-brand-navy text-3xl font-quran">
                                    الحمد لله الذي علم بالقلم، علم الإنسان ما لم يعلم، والصلاة والسلام على معلم البشرية الخير، نبينا محمد وعلى آله وصحبه أجمعين.
                                </p>
                                <p className="mb-10">
                                    يمثل هذا الملف توثيقاً لمسيرتي المهنية خلال العام الدراسي، وهو ليس مجرد رصد للأعمال، بل هو مرآة عاكسة لفلسفتي التعليمية القائمة على <strong>الابتكار، والتحول الرقمي، وتمكين الطالبة</strong>. أسعى من خلاله إلى تجويد الممارسات التدريسية وربط العلوم الفيزيائية بالواقع التطبيقي والتقنيات الحديثة.
                                </p>
                                <p>
                                    يضم الملف شواهد حية على التخطيط الاستراتيجي، والمبادرات التقنية، ونواتج تعلم الطالبات، والنمو المهني المستمر، سائلاً المولى عز وجل أن يكون هذا العمل خالصاً لوجهه الكريم ونافعاً للميدان التعليمي.
                                </p>
                            </div>
                        </div>
                    </div>

                    {/* صفحات الأقسام */}
                    {portfolioData.map((category, idx) => (
                        <div key={idx} className="page-container relative">
                            <div className="artistic-bg">
                                <div className={`absolute top-0 right-0 w-full h-full bg-gradient-to-br from-brand-gold/5 to-transparent`}></div>
                                <div className="pattern-overlay"></div>
                            </div>
                            
                            <div className="relative z-10">
                                <div className="flex items-center justify-between mb-12">
                                    <div className="flex items-center gap-6">
                                        <div className="icon-circle">
                                            {category.icon}
                                        </div>
                                        <h2 className="font-heading text-4xl font-black text-brand-navy">{category.section}</h2>
                                    </div>
                                    <div className="text-brand-gold font-black text-6xl opacity-20">0{idx + 1}</div>
                                </div>

                                <div className="grid grid-cols-1 gap-8">
                                    {category.items.map((item, i) => (
                                        <div key={i} className="avoid-break glass-card p-10 group">
                                            <div className="flex items-start gap-6 mb-6">
                                                <div className="w-3 h-12 bg-brand-gold rounded-full group-hover:scale-y-110 transition-transform"></div>
                                                <h3 className="font-heading text-3xl font-black text-brand-navyLight">{item.title}</h3>
                                            </div>
                                            
                                            <div className="text-gray-600 text-xl leading-relaxed mb-8 pr-9">
                                                {item.concept}
                                            </div>
                                            
                                            <div className="flex flex-wrap gap-4 pr-9">
                                                {item.links.map((link, j) => (
                                                    <a key={j} href={link.url} target="_blank" className="btn-creative">
                                                        <svg className="w-5 h-5 text-brand-gold" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                                                        {link.label}
                                                    </a>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    ))}

                    {/* صفحة الخاتمة */}
                    <div className="page-container relative">
                        <div className="artistic-bg">
                            <div className="bg-shape-2 opacity-40"></div>
                            <div className="pattern-overlay"></div>
                        </div>
                        
                        <div className="relative z-10 flex flex-col h-full">
                            <div className="flex items-center gap-6 mb-16">
                                <div className="icon-circle">
                                    <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg>
                                </div>
                                <h2 className="font-heading text-5xl font-black text-brand-navy">خاتمة</h2>
                            </div>

                            <div className="glass-card p-16 bg-brand-navy text-white border-none shadow-[0_40px_80px_-20px_rgba(15,23,42,0.4)] relative overflow-hidden">
                                <div className="absolute top-0 right-0 w-64 h-64 bg-brand-gold/10 rounded-full -mr-32 -mt-32"></div>
                                
                                <p className="text-3xl leading-[2] relative z-10 mb-12 font-quran">
                                    في ختام هذا الملف، أجدد العهد على مواصلة العطاء وتطوير الذات، مستمدة العون من الله عز وجل، ثم من الدعم اللامحدود الذي يحظى به قطاع التعليم في وطننا الغالي.
                                </p>
                                <p className="text-3xl leading-[2] relative z-10">
                                    إن الإنجاز الحقيقي ليس في توثيق الأوراق، بل في الأثر الذي نتركه في نفوس طالباتنا، وفي العقول التي نساهم في صياغتها لتكون لبنات صالحة في بناء نهضة المملكة. شكراً لكل من ساند ووجه، والقادم أجمل بإذن الله.
                                </p>
                                
                                <div className="mt-24 pt-12 border-t border-white/10 flex justify-between items-end relative z-10">
                                    <div>
                                        <p className="text-brand-gold font-black text-2xl mb-4 tracking-widest uppercase">المعلمة </p>
                                        <p className="text-6xl font-black">ندى محمد المجيرش</p>
                                    </div>
                                    <div className="text-left">
                                        <p className="text-xl opacity-60 font-bold mb-2"> عام</p>
                                        <p className="text-4xl font-black text-brand-gold">1447 هـ</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ArtisticPortfolio />);
    </script>
</body>
</html>
