                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                            حفظ الملف كـ PDF
                        </button>
                    </div>

                    {/* خلفيات الطباعة */}
                    <div className="artistic-bg">
                        <div className="bg-shape-1"></div>
                        <div className="bg-shape-2"></div>
                    </div>

                    {/* صفحة الغلاف */}
                    <div className="page-break-after relative z-10 bg-white rounded-3xl shadow-sm border-2 border-brand-gold/20 p-8 md:p-12 mb-10 text-center">
                        <div className="flex justify-between items-start mb-12">
                            <img src="logo1.png" alt="شعار المدارس" className="h-16 md:h-20 object-contain" onError={(e)=>e.target.style.display='none'} />
                            <div className="text-center mt-2">
                                <p className="text-sm font-black text-brand-navy/70">المملكة العربية السعودية</p>
                                <p className="text-sm font-black text-brand-navy/70">وزارة التعليم</p>
                            </div>
                            <img src="logo2.png" alt="شعار الشركة" className="h-16 md:h-20 object-contain" onError={(e)=>e.target.style.display='none'} />
                        </div>

                        <div className="mb-10">
                            <h2 className="font-heading text-3xl font-black text-brand-navy mb-4">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</h2>
                            <div className="w-20 h-1.5 bg-brand-gold mx-auto rounded-full"></div>
                        </div>

                        <h1 className="font-heading text-4xl md:text-5xl font-black text-brand-navyLight mb-10 leading-tight">ملف الإنجاز المهني المتكامل</h1>
                        
                        <div className="bg-brand-accent p-6 rounded-2xl border border-gray-200 mb-10 inline-block w-full max-w-md shadow-sm">
                            <h3 className="text-sm font-bold text-gray-500 mb-2 uppercase tracking-wide">إعداد المعلمة</h3>
                            <h2 className="text-3xl font-black text-brand-navy mb-3">ندى محمد المجيرش</h2>
                            <p className="text-base font-black text-brand-gold">معلمة الفيزياء والهندسة | NE231009</p>
                        </div>

                        <div className="text-right mt-4 p-6 bg-white border-r-4 border-brand-navy rounded-xl shadow-sm">
                            <h3 className="font-black text-brand-navy text-xl mb-3">الفلسفة التعليمية</h3>
                            <p className="text-gray-700 font-semibold leading-loose text-sm md:text-base">
                                أؤمن بأن التعليم ليس مجرد نقل للمعرفة، بل هو صناعة للأثر. رسالتي هي خلق بيئة تعليمية آمنة ومحفزة تنقل المفاهيم الفيزيائية من التجريد إلى التطبيق العملي. أسعى دائماً لتوظيف أحدث التقنيات لتمكين الطالبات، وإعدادهن ليكنّ جيلاً باحثاً، مبتكراً، وشريكاً فاعلاً في تحقيق رؤية المملكة 2030.
                            </p>
                        </div>
                        
                        <div className="flex flex-wrap gap-4 justify-center pt-8">
                            <a href="vision_mission.pdf" target="_blank" className="bg-brand-accent text-brand-navy border border-gray-200 px-6 py-3 rounded-xl text-sm font-bold hover:border-brand-gold flex items-center gap-2">
                                <svg className="w-5 h-5 text-brand-gold" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                                الرؤية والرسالة
                            </a>
                            <a href="nada.pdf" target="_blank" className="bg-brand-accent text-brand-navy border border-gray-200 px-6 py-3 rounded-xl text-sm font-bold hover:border-brand-gold flex items-center gap-2">
                                <svg className="w-5 h-5 text-brand-gold" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                                الرخصة المهنية
                            </a>
                        </div>
                    </div>

                    {/* عرض البنود بشكل متصل (Flow) */}
                    <div className="print-flow relative z-10 space-y-10">
                        {portfolioData.map((category, idx) => (
                            <div key={idx} className="mb-10">
                                <div className="flex items-center gap-4 mb-6">
                                    <div className="icon-circle">
                                        {category.icon}
                                    </div>
                                    <h2 className="font-heading text-2xl font-black text-brand-navy">{category.section}</h2>
                                </div>
                                
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    {category.items.map((item, i) => (
                                        <div key={i} className="avoid-break content-card flex flex-col h-full">
                                            <h3 className="font-heading text-xl font-bold text-brand-navyLight mb-3 pr-3 border-r-4 border-brand-gold">
                                                {item.title}
                                            </h3>
                                            <p className="text-gray-700 text-[14px] font-medium leading-relaxed mb-5 flex-1">
                                                {item.concept}
                                            </p>
                                            
                                            {item.links.length > 0 && (
                                                <div className="pt-4 border-t border-gray-100 flex flex-wrap gap-2">
                                                    {item.links.map((link, j) => (
                                                        <a key={j} href={link.url} target="_blank" className="link-btn">
                                                            <svg className="w-4 h-4 text-brand-gold" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                                                            {link.label}
                                                        </a>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* الخاتمة في صفحة مستقلة */}
                    <div className="page-break-after mt-12">
                        <div className="bg-brand-navy text-white rounded-3xl p-10 md:p-14 text-center border-4 border-brand-gold/30 relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-32 h-32 bg-brand-gold/10 rounded-bl-full"></div>
                            
                            <svg className="w-12 h-12 text-brand-gold mx-auto mb-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"></path></svg>
                            
                            <h3 className="font-heading text-2xl font-black text-brand-gold mb-6">خــــاتــــمــــة</h3>
                            <p className="text-gray-200 text-base md:text-lg font-semibold leading-loose max-w-3xl mx-auto">
                                إن هذا الملف ليس إلا توثيقاً لرحلة مستمرة من التعلم والعطاء التربوي. أتقدم بخالص الشكر والامتنان لإدارة المرحلة الثانوية بمدارس التربية النموذجية والمشرفات التربويات على الدعم المستمر والتوجيه السديد الذي ساهم في تجويد ممارساتي المهنية ورفع سقف طموحي. 
                                <br/><br/>
                                <span className="text-white font-black font-quran text-xl">وما توفيقي إلا بالله، عليه توكلت وإليه أنيب.</span>
                            </p>
                        </div>
                    </div>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PrintPerfectPortfolio />);
    </script>
</body>
</html>
