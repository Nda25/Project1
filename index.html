<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملف الإنجاز المهني | ندى المجيرش</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@500;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Cairo', 'sans-serif'], heading: ['Tajawal', 'sans-serif'] },
                    colors: { navy: '#0F172A', navyLight: '#1E293B', gold: '#C5A059', bglight: '#F8FAFC' }
                }
            }
        }
    </script>
    <style>
        body { background-color: #F8FAFC; color: #1e293b; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        
        /* إعدادات الطباعة الاحترافية */
        @media print {
            body { background-color: #ffffff !important; }
            .no-print { display: none !important; }
            .print-page-break { page-break-before: always; }
            .print-avoid-break { page-break-inside: avoid; break-inside: avoid; }
            .shadow-sm, .shadow-md, .shadow-lg { box-shadow: none !important; border: 1px solid #e5e7eb !important; }
            a { text-decoration: none !important; }
        }
    </style>
</head>
<body class="antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const portfolioData = [
            {
                section: "أولاً: التخطيط والإعداد المسبق",
                items: [
                    { 
                        title: "الخطط الفصلية واليومية", 
                        concept: "تصميم خطط تشغيلية مرنة ومحكمة تشمل التوزيع الفصلي للمنهج والخطط الأسبوعية التفصيلية المبنية على مستويات بلوم المعرفية، وتتكامل مع خطة 'نفكر بعمق' لتعزيز مهارات التفكير العليا. ولضمان استمرارية التعلم وتقليص الهدر، تم إعداد خطط بديلة لتفعيل حصص الاحتياط.",
                        links: [
                            { label: "توزيع الفصل الأول", url: "dd.pdf" },
                            { label: "توزيع الفصل الثاني", url: "cc.pdf" },
                            { label: "الخطة التفصيلية للدروس", url: "Plan.pdf" },
                            { label: "خطة مهارات التفكير العليا", url: "https://drive.google.com/drive/folders/180Io-M2v3fBxzMythe4Dlxycw8nN9tnH" },
                            { label: "شواهد تفعيل حصص الاحتياط", url: "https://drive.google.com/drive/folders/1NVXdT20YX2Or6d0USSC1Mzip41l6ksf2" }
                        ]
                    }
                ]
            },
            {
                section: "ثانياً: التقويم وأدوات القياس",
                items: [
                    { 
                        title: "الاختبارات، أوراق العمل، والفروق الفردية", 
                        concept: "بناء أدوات تقويم متنوعة وموضوعية تقيس مدى تحقق نواتج التعلم بدقة، وتشمل اختبارات دورية وأوراق عمل تفاعلية. مع تطبيق التصميم العكسي للتدريس لتوفير بدائل تعليمية متمايزة تلبي تنوع أنماط تعلم الطالبات (البصرية، الحركية) كعلاج أكاديمي وإثراء مستمر.",
                        links: [
                            { label: "نموذج اختبار دوري (1)", url: "test1.pdf" },
                            { label: "نموذج اختبار دوري (2)", url: "test2.pdf" },
                            { label: "تقرير مراعاة الفروق الفردية", url: "individual_diff.pdf" },
                            { label: "تقييم الطالبات لأنفسهم (تأمل ذاتي)", url: "https://drive.google.com/drive/folders/166FyHf1F4DmmIu3BwyAe-VlfPc4m75yc" }
                        ]
                    }
                ]
            },
            {
                section: "ثالثاً: الابتكارات والمبادرات التربوية",
                items: [
                    { 
                        title: "منصة «أثر» لتوليد الاستراتيجيات", 
                        concept: "من رحم المعاناة والعبء المعرفي والزمني الملقى على عاتق المعلم في التخطيط اليومي للدروس، ولدت مبادرة منصة 'أثر'. وهي منصة رقمية ابتكرتها تعتمد على تقنيات الذكاء الاصطناعي التوليدي، لتمكين الكادر التعليمي من توليد استراتيجيات تدريسية نوعية بلحظات، مما يضمن التنوع وتقليص الهدر.",
                        links: [
                            { label: "زيارة منصة أثر", url: "https://n-athar.co" },
                            { label: "تقرير مبادرة منصة أثر", url: "athar_report.pdf" }
                        ]
                    },
                    { 
                        title: "المحاكاة الرقمية وتطبيقات التعلم النشط", 
                        concept: "الابتعاد عن التلقين عبر توظيف استراتيجية المحاكاة الرقمية (PhET) لتبسيط المفاهيم المجردة، وتصميم 'حقيبة ألعاب كانفا' التفاعلية، وتطبيق استراتيجيات تدريس الأقران والخرائط المفاهيمية.",
                        links: [
                            { label: "تقرير توظيف البحوث (PhET)", url: "ff.pdf" },
                            { label: "شواهد تطبيق المحاكاة", url: "https://drive.google.com/drive/folders/18QlC7a2q_2Z9p1M6ZKHdSOXosGm9dK95" },
                            { label: "تقرير حقيبة ألعاب كانفا", url: "canva_report.pdf" },
                            { label: "بطاقات الاستراتيجيات والدروس", url: "https://drive.google.com/drive/folders/1oGDnB3IhAbMBEPHvg4dZbLriOPWrj8-T" }
                        ]
                    }
                ]
            },
            {
                section: "رابعاً: إنجازات وأعمال الطالبات",
                items: [
                    { 
                        title: "المشاريع العلمية والإنتاج المعرفي", 
                        concept: "الارتقاء بدور الطالبة من متلقية إلى باحثة ومنتجة للمعرفة من خلال تحفيزهن على البحث الموجه في المنصات المعتمدة لإنتاج أبحاث علمية رصينة، وتصميم خرائط مفاهيم متقدمة، وتنفيذ تجارب عملية تعكس عمق الفهم.",
                        links: [
                            { label: "أبحاث الطالبات المعتمدة", url: "https://drive.google.com/drive/folders/1MkY9Zf_SrFEWRzH7IDQB3QmF-Dp_2zIe" },
                            { label: "مشاريع الطالبات العلمية", url: "https://drive.google.com/drive/folders/1-4pthTfiLT4NkEIDmB0CAxCUIQiXfhoU" },
                            { label: "خرائط مفاهيم (أعمال الطالبات)", url: "https://drive.google.com/drive/folders/1BG12LoQPLdLzqp85pt1MsnDJgPi98Ynn" },
                            { label: "تجارب وشرح الطالبات", url: "https://drive.google.com/drive/folders/12NXTdmhSWuTW6TvjOnhGZZ_ieedcEhZo" }
                        ] 
                    }
                ]
            },
            {
                section: "خامساً: الأنشطة، الشراكة، والربط بالوطن",
                items: [
                    { 
                        title: "المسابقات العالمية، التطوع، ورؤية 2030", 
                        concept: "تنمية الشعور بالمسؤولية الذاتية والوطنية عبر ربط الفيزياء بقضايا البيئة (كالرياض الخضراء والتغير المناخي). بالإضافة إلى تأهيل الطالبات وتدريبهن للمشاركة في المسابقة العالمية للذكاء الاصطناعي (WAICY)، وتنظيم رحلات علمية ميدانية متخصصة.",
                        links: [
                            { label: "شهادات المشاركة بمسابقة (WAICY)", url: "https://drive.google.com/drive/folders/1rxBTVJ8XGidiWpI0p-sVZe5TOpFOlbNi" },
                            { label: "رحلة مدينة الملك عبدالعزيز (KACST)", url: "https://drive.google.com/drive/folders/1Jyjape3y7dyTEQN3o6LwMSGtswb0rGIl" },
                            { label: "شواهد الربط بالوطن (رؤية 2030)", url: "https://drive.google.com/drive/folders/1h0tFn1_p_9ZcFO9XSHS9GfDLY644ytpl" },
                            { label: "مبادرات العمل التطوعي (كسوة الشتاء وغيرها)", url: "https://drive.google.com/drive/folders/1kablG2gj-3EgqqEiyzslHJZwmXwVTRFC" },
                            { label: "شواهد التحفيز والتعزيز", url: "https://drive.google.com/drive/folders/1YB3YIBdaZQYTz7f3xD9Z0sf5bPsud-iq" }
                        ] 
                    }
                ]
            },
            {
                section: "سادساً: التنمية المهنية ومجتمعات التعلم",
                items: [
                    { 
                        title: "التطوير المستدام ونقل الأثر", 
                        concept: "العمل التشاركي وتبادل الخبرات عبر تفعيل مجتمعات التعلم المهنية (PLC) والزيارات التبادلية. والتخطيط الاستباقي للنمو المهني عبر تعبئة استمارات التأمل الذاتي، وتقديم ورش عمل تدريبية لنقل الأثر للزميلات.",
                        links: [
                            { label: "خطة التطوير المهني", url: "pd_plan.pdf" },
                            { label: "استمارة تحديد الاحتياجات", url: "needs_assessment.pdf" },
                            { label: "تقرير مجتمعات التعلم (PLC)", url: "plc_report.pdf" },
                            { label: "سجل الدورات وكشوفات الحضور", url: "https://drive.google.com/drive/folders/1xya-WXw4wqnmvEluEnV44HTmXL0ANHvf" },
                            { label: "محاضر الاجتماعات", url: "meeting_1.pdf" },
                            { label: "شواهد البرامج والدروس التطبيقية", url: "https://drive.google.com/drive/folders/1EfBIqZW5_pwEjZFMVG7rWWMJA2To7Gdw" }
                        ] 
                    }
                ]
            },
            {
                section: "سابعاً: قياس الأثر وتقييم الأداء",
                items: [
                    { 
                        title: "الآراء، التقييم السنوي، وخطط التحسين", 
                        concept: "التقييم المؤسسي والذاتي لتحديد نقاط القوة بوضوح، عبر استطلاع آراء الطالبات وأولياء الأمور وتحليلها، ودراسة نتائج الأداء الوظيفي، وتصميم خطط إجرائية محكمة لمعالجة فرص التحسين وضمان تحقيق درجات الأداء النهائية.",
                        links: [
                            { label: "نتائج استطلاع المستفيدين (الآراء)", url: "survey.pdf" },
                            { label: "دراسة تحليل الأداء الوظيفي", url: "analysis_report.pdf" },
                            { label: "تقييم الأداء (العام الماضي)", url: "eval_last_year.pdf" },
                            { label: "تقييم الأداء (العام الحالي 100%)", url: "eval_this_year.pdf" },
                            { label: "الخطة الإجرائية للتحسين", url: "action_plan.pdf" },
                            { label: "شواهد الحضور المبكر", url: "https://drive.google.com/drive/folders/16q7LHOfvFlMiVRh2n_knjYlaW0_CBg83" }
                        ] 
                    }
                ]
            }
        ];

        function FullPortfolio() {
            return (
                <div className="bg-bglight min-h-screen pb-12 font-sans">
                    
                    {/* الترويسة العلوية للطباعة والشاشات */}
                    <header className="bg-white border-b-4 border-gold shadow-sm sticky top-0 z-50 print:static print:shadow-none">
                        <div className="max-w-5xl mx-auto px-6 py-4 flex justify-between items-center">
                            <img src="https://f.top4top.io/p_37235mo091.png" alt="شعار" className="h-10 md:h-14 object-contain" />
                            <div className="text-center">
                                <h1 className="font-heading text-xl md:text-3xl font-black text-navy">ندى محمد المجيرش</h1>
                                <p className="text-xs md:text-sm font-bold text-gray-600 mt-1">معلمة فيزياء - المرحلة الثانوية | <span className="text-gold">NE231009</span></p>
                            </div>
                            <img src="https://k.top4top.io/p_37234u2y41.png" alt="شعار" className="h-10 md:h-14 object-contain" />
                        </div>
                    </header>

                    {/* زر الطباعة (يختفي وقت الطباعة) */}
                    <div className="max-w-5xl mx-auto px-6 pt-6 flex justify-end no-print">
                        <button 
                            onClick={() => window.print()}
                            className="bg-navy text-white px-5 py-2 rounded-lg text-sm font-bold flex items-center gap-2 shadow-md hover:bg-gold transition-colors"
                        >
                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                            تصدير كملف PDF
                        </button>
                    </div>

                    <main className="max-w-5xl mx-auto px-6 py-8">
                        
                        {/* المقدمة والسيرة */}
                        <div className="bg-white rounded-2xl shadow-sm border border-gray-200 p-8 md:p-10 mb-10 print-avoid-break relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-2 h-full bg-gold"></div>
                            <h2 className="font-heading text-3xl font-black text-navy mb-4">السيرة المهنية والتوجه</h2>
                            <p className="text-gray-700 text-base md:text-lg leading-relaxed font-semibold mb-6">
                                أمتلك شغفاً حقيقياً بتطوير البيئة التعليمية ودمج التقنية بالتعليم لتسهيل المفاهيم الفيزيائية المجردة. أسعى دائماً لتحقيق نواتج تعلم عالية الجودة تتوافق مع التوجه الاستراتيجي ورؤية المملكة 2030، من خلال تطبيق استراتيجيات التعلم النشط، والمحاكاة الرقمية، وربط المادة بقضايا الوطن والبيئة.
                            </p>
                            <div className="flex flex-wrap gap-4">
                                <a href="nada.pdf" target="_blank" className="inline-flex items-center gap-2 bg-navy text-white px-5 py-2.5 rounded-xl text-sm font-bold shadow-sm hover:bg-gold">
                                    الرخصة المهنية المعتمدة
                                </a>
                                <a href="vision_mission.pdf" target="_blank" className="inline-flex items-center gap-2 bg-white border-2 border-gray-200 text-navy px-5 py-2.5 rounded-xl text-sm font-bold shadow-sm hover:border-gold">
                                    وثيقة الرؤية والرسالة
                                </a>
                            </div>
                        </div>

                        {/* إحصائيات سريعة (تعطي انطباع مرعب للمقيم) */}
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-12 print-avoid-break">
                            <div className="bg-white border-b-4 border-gold p-5 rounded-xl shadow-sm text-center">
                                <div className="text-3xl font-black text-navy mb-1">100%</div>
                                <div className="text-xs font-bold text-gray-500 uppercase">التقييم الوظيفي السنوي</div>
                            </div>
                            <div className="bg-white border-b-4 border-navyLight p-5 rounded-xl shadow-sm text-center">
                                <div className="text-3xl font-black text-navy mb-1">+4.6</div>
                                <div className="text-xs font-bold text-gray-500 uppercase">مؤشر رضا المستفيدين</div>
                            </div>
                            <div className="bg-white border-b-4 border-gold p-5 rounded-xl shadow-sm text-center">
                                <div className="text-3xl font-black text-navy mb-1">WAICY</div>
                                <div className="text-xs font-bold text-gray-500 uppercase">تأهيل عالمي للطالبات</div>
                            </div>
                            <div className="bg-white border-b-4 border-navyLight p-5 rounded-xl shadow-sm text-center">
                                <div className="text-3xl font-black text-navy mb-1">أثـر</div>
                                <div className="text-xs font-bold text-gray-500 uppercase">ابتكار منصة ذكاء اصطناعي</div>
                            </div>
                        </div>

                        {/* استعراض البنود والمجالات */}
                        <div className="space-y-12">
                            {portfolioData.map((category, idx) => (
                                <div key={idx} className="print-page-break">
                                    <h2 className="font-heading text-2xl font-black text-gold mb-6 border-b-2 border-gray-100 pb-3">
                                        {category.section}
                                    </h2>
                                    
                                    <div className="grid gap-6">
                                        {category.items.map((item, itemIdx) => (
                                            <div key={itemIdx} className="bg-white p-6 rounded-xl border border-gray-200 shadow-sm print-avoid-break">
                                                <h3 className="font-heading text-xl font-bold text-navyLight mb-3 flex items-center gap-2">
                                                    <span className="w-2 h-2 rounded-full bg-gold inline-block"></span>
                                                    {item.title}
                                                </h3>
                                                <p className="text-gray-700 text-sm md:text-base leading-relaxed mb-5 bg-gray-50 p-4 rounded-lg">
                                                    {item.concept}
                                                </p>
                                                
                                                <div>
                                                    <h4 className="text-xs font-black text-gray-400 mb-3 uppercase tracking-wider">الشواهد والمرفقات</h4>
                                                    <div className="flex flex-wrap gap-2.5">
                                                        {item.links.map((link, i) => (
                                                            <a key={i} href={link.url} target="_blank" className="inline-flex items-center gap-1.5 bg-white border border-gray-200 text-navy px-3 py-2 rounded-lg text-xs md:text-sm font-bold hover:border-gold hover:text-gold transition-all">
                                                                <svg className="w-4 h-4 text-gold opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                                                                {link.label}
                                                            </a>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>

                    </main>
                    
                    <footer className="text-center py-8 text-gray-400 text-xs font-bold mt-10 border-t border-gray-200 print-avoid-break">
                        تم إعداد هذا الملف لتوثيق الإنجازات المهنية والممارسات التربوية وفق أعلى معايير الجودة التعليمية.
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<FullPortfolio />);
    </script>
</body>
</html>
