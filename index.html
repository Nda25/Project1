                            <div className="flex items-center gap-8 mb-16">
                                <div className="icon-circle">
                                    <svg className="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                                </div>
                                <h2 className="font-heading text-6xl font-black text-brand-navy">مقدمة الملف</h2>
                            </div>

                            <div className="content-card border-r-[12px] border-brand-gold">
                                <p className="mb-12 font-bold text-brand-navy text-4xl font-quran leading-relaxed">
                                    الحمد لله الذي علم بالقلم، علم الإنسان ما لم يعلم، والصلاة والسلام على معلم البشرية الخير، نبينا محمد وعلى آله وصحبه أجمعين.
                                </p>
                                <p className="mb-10 text-2xl leading-[2.2] text-gray-700">
                                    يمثل هذا الملف توثيقاً لمسيرتي المهنية خلال العام الدراسي، وهو ليس مجرد رصد للأعمال، بل هو مرآة عاكسة لفلسفتي التعليمية القائمة على <strong>الابتكار، والتحول الرقمي، وتمكين الطالبة</strong>. أسعى من خلاله إلى تجويد الممارسات التدريسية وربط العلوم الفيزيائية بالواقع التطبيقي والتقنيات الحديثة.
                                </p>
                                <p className="text-2xl leading-[2.2] text-gray-700">
                                    يضم الملف شواهد حية على التخطيط الاستراتيجي، والمبادرات التقنية، ونواتج تعلم الطالبات، والنمو المهني المستمر، سائلاً المولى عز وجل أن يكون هذا العمل خالصاً لوجهه الكريم ونافعاً للميدان التعليمي.
                                </p>
                            </div>
                        </div>
                    </div>

                    {/* صفحات الأقسام */}
                    {portfolioData.map((category, idx) => (
                        <div key={idx} className="page-container">
                            <div className="artistic-bg">
                                <div className="bg-shape-1 opacity-30"></div>
                                <div className="bg-shape-2 opacity-30"></div>
                            </div>
                            
                            <div className="relative z-10">
                                <div className="flex items-center justify-between mb-16">
                                    <div className="flex items-center gap-8">
                                        <div className="icon-circle">
                                            {category.icon}
                                        </div>
                                        <h2 className="font-heading text-5xl font-black text-brand-navy">{category.section}</h2>
                                    </div>
                                    <div className="text-brand-gold font-black text-8xl opacity-20">0{idx + 1}</div>
                                </div>

                                <div className="grid grid-cols-1 gap-10">
                                    {category.items.map((item, i) => (
                                        <div key={i} className="avoid-break content-card">
                                            <div className="flex items-center gap-6 mb-8">
                                                <div className="w-4 h-16 bg-brand-gold rounded-full"></div>
                                                <h3 className="font-heading text-4xl font-black text-brand-navyLight">{item.title}</h3>
                                            </div>
                                            
                                            <div className="text-gray-700 text-2xl leading-relaxed mb-10 pr-10">
                                                {item.concept}
                                            </div>
                                            
                                            <div className="flex flex-wrap gap-6 pr-10">
                                                {item.links.map((link, j) => (
                                                    <a key={j} href={link.url} target="_blank" className="link-btn">
                                                        <svg className="w-6 h-6 text-brand-gold" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                                                        {link.label}
                                                    </a>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    ))}

                    {/* صفحة الخاتمة */}
                    <div className="page-container">
                        <div className="artistic-bg">
                            <div className="bg-shape-2 opacity-50"></div>
                        </div>
                        
                        <div className="relative z-10 flex flex-col h-full">
                            <div className="flex items-center gap-8 mb-16">
                                <div className="icon-circle">
                                    <svg className="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg>
                                </div>
                                <h2 className="font-heading text-6xl font-black text-brand-navy">خاتمة</h2>
                            </div>

                            <div className="content-card bg-brand-navy text-white border-none shadow-2xl relative overflow-hidden p-16">
                                <div className="absolute top-0 right-0 w-80 h-80 bg-brand-gold/10 rounded-full -mr-40 -mt-40"></div>
                                
                                <p className="text-4xl leading-[2] relative z-10 mb-16 font-quran">
                                    في ختام هذا الملف، أجدد العهد على مواصلة العطاء وتطوير الذات، مستمدة العون من الله عز وجل، ثم من الدعم اللامحدود الذي يحظى به قطاع التعليم في وطننا الغالي.
                                </p>
                                <p className="text-3xl leading-[2.2] relative z-10">
                                    إن الإنجاز الحقيقي ليس في توثيق الأوراق، بل في الأثر الذي نتركه في نفوس طالباتنا، وفي العقول التي نساهم في صياغتها لتكون لبنات صالحة في بناء نهضة المملكة. شكراً لكل من ساند ووجه، والقادم أجمل بإذن الله.
                                </p>
                                
                                <div className="mt-24 pt-12 border-t border-white/10 flex justify-between items-end relative z-10">
                                    <div>
                                        <p className="text-brand-gold font-black text-2xl mb-6 tracking-widest uppercase">المعلمة</p>
                                        <p className="text-7xl font-black">ندى محمد المجيرش</p>
                                    </div>
                                    <div className="text-left">
                                        <p className="text-2xl opacity-60 font-bold mb-4"> عام</p>
                                        <p className="text-5xl font-black text-brand-gold">1447 هـ</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PrintPerfectPortfolio />);
    </script>
</body>
</html>
