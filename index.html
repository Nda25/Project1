<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Cairo', 'sans-serif'], heading: ['Tajawal', 'sans-serif'] },
                    colors: { navy: '#0F172A', navyLight: '#1E293B', gold: '#C5A059', goldLight: '#E2C792', bglight: '#F8FAFC', cardbg: '#F1F5F9' }
                }
            }
        }
    </script>
    <style>
        body { 
            background-color: #f3f4f6; 
            color: #1e293b; 
            -webkit-print-color-adjust: exact !important; 
            print-color-adjust: exact !important; 
        }
        /* إعدادات الطباعة الاحترافية */
        @page { size: A4; margin: 12mm 15mm; }
        @media print {
            body { background-color: #ffffff !important; font-size: 13pt; }
            .no-print { display: none !important; }
            /* كسر الصفحات المنظم */
            .page-break { page-break-before: always !important; }
            .avoid-break { break-inside: avoid !important; page-break-inside: avoid !important; }
            /* منع ظهور الروابط كنصوص */
            a[href]:after { content: none !important; }
            
            .print-border { border: 2px solid #e2e8f0 !important; }
            .print-bg-light { background-color: #F8FAFC !important; }
            .print-bg-btn { background-color: #E2E8F0 !important; border: 1px solid #cbd5e1 !important; }
            .print-text-gold { color: #C5A059 !important; }
            .print-bg-navy { background-color: #0F172A !important; color: #ffffff !important; }
            
            /* تعديل مسافات الطباعة */
            .print-section-margin { margin-bottom: 2rem !important; }
            .print-force-block { display: block !important; width: 100% !important; margin-bottom: 1.5rem !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const portfolioData = [
            {
                id: 1,
                breakPage: true,
                section: "أولاً: التخطيط والإعداد المسبق",
                items: [
                    { 
                        title: "توزيع المنهج الدراسي", 
                        concept: <span>بناء خطة زمنية دقيقة لتوزيع المقررات الدراسية تتوافق مع الأوزان النسبية للأسابيع الدراسية وتضمن <strong>ختم المنهج</strong> في الوقت المحدد.</span>,
                        links: [{ label: "توزيع خطة الفصل الأول", url: "dd.pdf" }, { label: "توزيع خطة الفصل الثاني", url: "cc.pdf" }] 
                    },
                    { 
                        title: "الخطط التفصيلية وإدارة الطوارئ", 
                        concept: <span>تصميم الدروس اليومية وفق <strong>مستويات بلوم العليا</strong>، مع تجهيز خطط بديلة وحقائب تفاعلية لحصص الاحتياط لضمان استمرارية التعلم.</span>,
                        links: [{ label: "الخطة التفصيلية للدروس", url: "Plan.pdf" }, { label: "خطة مهارات التفكير العليا", url: "https://drive.google.com/drive/folders/180Io-M2v3fBxzMythe4Dlxycw8nN9tnH" }, { label: "شواهد تفعيل حصص الاحتياط", url: "https://drive.google.com/drive/folders/1NVXdT20YX2Or6d0USSC1Mzip41l6ksf2" }]
                    }
                ]
            },
            {
                id: 2,
                breakPage: true,
                section: "ثانياً: القياس والتقويم",
                items: [
                    { 
                        title: "أدوات القياس المتنوعة", 
                        concept: <span>إعداد اختبارات وأوراق عمل موضوعية ومحكمة تقيس بدقة مدى تحقق <strong>نواتج التعلم</strong>، مع تفعيل التقييم الذاتي للطالبات.</span>,
                        links: [{ label: "نموذج اختبار (1)", url: "test1.pdf" }, { label: "نموذج اختبار (2)", url: "test2.pdf" }, { label: "نماذج التقييم الذاتي للطالبات", url: "https://drive.google.com/drive/folders/166FyHf1F4DmmIu3BwyAe-VlfPc4m75yc" }]
                    },
                    { 
                        title: "مراعاة الفروق الفردية", 
                        concept: <span>التصميم العكسي للتدريس عبر توفير بدائل متمايزة للتعلم (بصري، حركي)، وتطبيق استراتيجية <strong>تدريس الأقران</strong> كإثراء للمتفوقات.</span>,
                        links: [{ label: "تقرير الفروق الفردية", url: "individual_diff.pdf" }, { label: "فيديو تطبيق تدريس الأقران", url: "https://youtu.be/w9B5sYzYrlE?si=fAotddWFnHQypqmb" }]
                    }
                ]
            },
            {
                id: 3,
                breakPage: true,
                section: "ثالثاً: الاستراتيجيات والابتكار التقني",
                items: [
                    { 
                        title: "الابتكار النوعي (منصة أثر)", 
                        concept: <span>ابتكار وتطوير <strong>(منصة أثر)</strong> التوليدية كحل تقني لتسريع عملية التخطيط المدرسي وابتكار استراتيجيات تفاعلية تقلل من العبء المعرفي على المعلم.</span>,
                        links: [{ label: "رابط منصة أثر", url: "https://n-athar.co" }, { label: "تقرير مبادرة المنصة", url: "athar_report.pdf" }]
                    },
                    { 
                        title: "المحاكاة الرقمية والألعاب", 
                        concept: <span>استخدام استراتيجية المحاكاة الرقمية <strong>(PhET)</strong> لتبسيط المفاهيم الفيزيائية المجردة، وتصميم حقائب ألعاب بـ <strong>(Canva)</strong> لكسر الجمود الصفي.</span>,
                        links: [{ label: "شواهد تطبيق المحاكاة (PhET)", url: "https://drive.google.com/drive/folders/18QlC7a2q_2Z9p1M6ZKHdSOXosGm9dK95" }, { label: "تقرير حقيبة ألعاب كانفا", url: "canva_report.pdf" }, { label: "بطاقات الاستراتيجيات", url: "https://drive.google.com/drive/folders/1oGDnB3IhAbMBEPHvg4dZbLriOPWrj8-T" }]
                    }
                ]
            },
            {
                id: 4,
                breakPage: true,
                section: "رابعاً: المخرجات والأنشطة الطلابية",
                items: [
                    { 
                        title: "الرحلات والمنافسات العالمية", 
                        concept: <span>تأهيل الطالبات وتدريبهن للمشاركة في المسابقة العالمية للذكاء الاصطناعي <strong>(WAICY)</strong>، وربطهن بالمؤسسات الوطنية عبر الرحلات الميدانية.</span>,
                        links: [{ label: "شهادات مسابقة (WAICY)", url: "https://drive.google.com/drive/folders/1rxBTVJ8XGidiWpI0p-sVZe5TOpFOlbNi" }, { label: "زيارة مدينة الملك عبدالعزيز (KACST)", url: "https://drive.google.com/drive/folders/1Jyjape3y7dyTEQN3o6LwMSGtswb0rGIl" }] 
                    },
                    { 
                        title: "الأبحاث ومشاريع (STEM)", 
                        concept: <span>تحويل الطالبات لباحثات عبر تفعيل المكتبات الرقمية وإنتاج مشاريع تدمج <strong>الفيزياء بالهندسة</strong> وربطها بـ <strong>رؤية 2030</strong> (كالتغير المناخي).</span>,
                        links: [{ label: "مشاريع الطالبات (STEM)", url: "https://drive.google.com/drive/folders/1-4pthTfiLT4NkEIDmB0CAxCUIQiXfhoU" }, { label: "الأبحاث العلمية المعتمدة", url: "https://drive.google.com/drive/folders/1MkY9Zf_SrFEWRzH7IDQB3QmF-Dp_2zIe" }, { label: "شواهد الربط بالوطن والمناخ", url: "https://drive.google.com/drive/folders/1h0tFn1_p_9ZcFO9XSHS9GfDLY644ytpl" }] 
                    },
                    { 
                        title: "المسؤولية المجتمعية", 
                        concept: <span>غرس القيم الإيجابية عبر إشراك الطالبات في مبادرات <strong>العمل التطوعي</strong> كحملات كسوة الشتاء، وحوكمة وتنظيم البيئة المدرسية.</span>,
                        links: [{ label: "مبادرات العمل التطوعي", url: "https://drive.google.com/drive/folders/1kablG2gj-3EgqqEiyzslHJZwmXwVTRFC" }, { label: "حوكمة وتنظيم المعمل", url: "https://drive.google.com/drive/folders/15zqvdJVEFKhfcfu5UJ2skR14o7wS1rqD" }] 
                    }
                ]
            },
            {
                id: 5,
                breakPage: true,
                section: "خامساً: الأداء الوظيفي ورضا المستفيدين",
                items: [
                    { 
                        title: "التميز والانضباط الوظيفي", 
                        concept: <span>تحقيق التميز في الأداء الوظيفي بنسبة <strong>(100%)</strong> نتيجة الالتزام بالخطط الإجرائية، والانضباط العالي، والتطوير المستمر للممارسات الصفية.</span>,
                        links: [{ label: "تقييم الأداء السنوي (100%)", url: "eval_this_year.pdf" }, { label: "تحليل الأداء الوظيفي", url: "analysis_report.pdf" }, { label: "شواهد الانضباط (البصمة)", url: "https://drive.google.com/drive/folders/16q7LHOfvFlMiVRh2n_knjYlaW0_CBg83" }, { label: "الخطة الإجرائية للتحسين", url: "action_plan.pdf" }]
                    },
                    { 
                        title: "قياس أثر التعلم", 
                        concept: <span>توزيع استبانات دورية رقمية للطالبات وأولياء الأمور لقياس مؤشرات <strong>الرضا</strong>، وتوظيف التغذية الراجعة في تحسين نواتج التعلم.</span>,
                        links: [{ label: "نتائج استطلاع المستفيدين", url: "survey.pdf" }]
                    }
                ]
            },
            {
                id: 6,
                breakPage: true, // صفحة جديدة للنمو المهني
                section: "سادساً: التنمية المهنية المستدامة",
                items: [
                    { 
                        title: "مجتمعات التعلم والتدريب", 
                        concept: <span>نقل الخبرات عبر الدروس التطبيقية، وحضور البرامج التدريبية المتخصصة، وتفعيل <strong>مجتمعات التعلم المهنية (PLC)</strong> بشكل دوري.</span>,
                        links: [{ label: "سجل الدورات التدريبية", url: "https://drive.google.com/drive/folders/1xya-WXw4wqnmvEluEnV44HTmXL0ANHvf" }, { label: "تقرير مجتمعات التعلم (PLC)", url: "plc_report.pdf" }, { label: "استمارة زيارة تبادلية", url: "peer_visit.pdf" }, { label: "خطة التطوير المهني", url: "pd_plan.pdf" }]
                    }
                ]
            },
            {
                id: 7,
                breakPage: false, // تكمل بنفس صفحة سادساً لأنهم صغار
                section: "سابعاً: الشكر والتقدير",
                items: [
                    { 
                        title: "الشهادات وخطابات الشكر", 
                        concept: <span>توثيق للإنجازات والجهود المبذولة من خلال خطابات <strong>الشكر والتقدير</strong> المقدمة من الإدارة المدرسية والجهات الإشرافية.</span>,
                        links: [{ label: "سجل شهادات الشكر والتقدير", url: "https://drive.google.com/drive/folders/1OMhmmxBtGFy6Z8e6N1otBH_RvF6gb0Gk" }]
                    }
                ]
            },
            {
                id: 8,
                breakPage: true,
                section: "ثامناً: التأمل الذاتي للتحسين المستمر",
                items: [
                    { 
                        title: "وقفة تأمل وتقييم للمسيرة التربوية", 
                        concept: <span>من خلال رحلتي في تعليم الفيزياء، أدركت أن التحدي لا يكمن في تبسيط القوانين المجردة فحسب، بل في إشعال الشغف بالاستكشاف. ابتكار <strong>منصة (أثر)</strong> جاء نتيجة تأمل عميق لاحتياجات الميدان لتخفيف العبء وتجويد المخرجات. أطمح مستقبلاً للتوسع في دمج منهجيات <strong>(STEM)</strong> وتعزيز أدوات الذكاء الاصطناعي لمواكبة متطلبات <strong>رؤية 2030</strong> وإعداد جيل يقود المستقبل.</span>,
                        links: [] 
                    }
                ]
            }
        ];

        function FullPortfolio() {
            return (
                <div className="max-w-5xl mx-auto p-4 sm:p-8 font-sans text-navy">
                    
                    {/* زر الطباعة المخصص */}
                    <div className="no-print text-center mb-8 p-6 bg-white rounded-2xl shadow-md border-t-4 border-navy">
                        <h3 className="font-bold text-navy mb-2 text-lg">جاهزة للطباعة؟</h3>
                        <p className="text-sm text-gray-500 mb-4">للحصول على أفضل نتيجة، أزيلي التحديد عن (الرؤوس والتذييلات - Headers and footers) وفعّلي (رسومات الخلفية).</p>
                        <button onClick={() => window.print()} className="bg-gold text-white px-8 py-3 rounded-xl font-black shadow-lg hover:bg-navy transition-all duration-300 flex items-center justify-center gap-2 mx-auto">
                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                            تصدير ملف الإنجاز (PDF)
                        </button>
                    </div>

                    {/* صفحة الغلاف والمقدمة */}
                    <div className="bg-white rounded-3xl shadow-md border-b-8 border-gold p-8 md:p-14 mb-12 print-border print-shadow-none">
                        <header className="flex justify-between items-center pb-8 mb-10 border-b border-gray-100">
                            <img src="logo1.png" alt="شعار المدرسة" className="h-16 md:h-20 object-contain" onError={(e)=>e.target.style.display='none'} />
                            <img src="logo2.png" alt="شعار الشركة" className="h-16 md:h-20 object-contain" onError={(e)=>e.target.style.display='none'} />
                        </header>
                        
                        <div className="text-center max-w-3xl mx-auto mt-4">
                            <h2 className="font-heading text-3xl font-black text-navy mb-4">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</h2>
                            <div className="w-20 h-1.5 bg-gold mx-auto mb-10 rounded-full"></div>
                            
                            <h1 className="font-heading text-4xl md:text-5xl font-black text-navyLight mb-12 leading-tight">ملف الإنجاز المهني المتكامل</h1>
                            
                            <div className="bg-cardbg print-bg-light p-6 rounded-2xl border border-gray-200 mb-10 inline-block w-full max-w-md shadow-inner">
                                <h3 className="text-sm font-bold text-gray-500 mb-2 uppercase tracking-wide">إعداد المعلمة</h3>
                                <h2 className="text-3xl font-black text-navy mb-3">ندى محمد المجيرش</h2>
                                <p className="text-base font-black text-gold">معلمة الفيزياء والهندسة | NE231009</p>
                            </div>

                            <div className="text-right mt-4 p-6 bg-white border-r-4 border-navy rounded-xl shadow-sm">
                                <h3 className="font-black text-navy text-xl mb-3">الفلسفة التعليمية</h3>
                                <p className="text-gray-700 font-semibold leading-loose text-sm md:text-base">
                                    أؤمن بأن التعليم ليس مجرد نقل للمعرفة، بل هو صناعة للأثر. رسالتي هي خلق بيئة تعليمية آمنة ومحفزة تنقل المفاهيم الفيزيائية من التجريد إلى التطبيق العملي. أسعى دائماً لتوظيف أحدث التقنيات وأدوات الذكاء الاصطناعي لتمكين الطالبات، وإعدادهن ليكنّ جيلاً باحثاً، مبتكراً، وشريكاً فاعلاً في تحقيق رؤية المملكة 2030.
                                </p>
                            </div>
                            
                            <div className="flex flex-wrap gap-4 justify-center pt-8">
                                <a href="vision_mission.pdf" target="_blank" className="bg-navy/5 text-navy border border-navy/20 print-bg-btn px-6 py-3 rounded-xl text-sm font-bold hover:bg-gold hover:text-white hover:border-gold transition-all flex items-center gap-2">
                                    <svg className="w-5 h-5 print-text-gold" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                                    الرؤية والرسالة
                                </a>
                                <a href="nada.pdf" target="_blank" className="bg-navy/5 text-navy border border-navy/20 print-bg-btn px-6 py-3 rounded-xl text-sm font-bold hover:bg-gold hover:text-white hover:border-gold transition-all flex items-center gap-2">
                                    <svg className="w-5 h-5 print-text-gold" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                                    الرخصة المهنية
                                </a>
                            </div>
                        </div>
                    </div>

                    {/* عرض البنود - كل قسم حسب إعدادات كسر الصفحة */}
                    <div className="space-y-12">
                        {portfolioData.map((category) => (
                            <section key={category.id} className={`${category.breakPage ? 'page-break' : ''} print-section-margin`}>
                                <h2 className="font-heading text-2xl font-black text-navy mb-6 flex items-center gap-3">
                                    <span className="w-8 h-1 bg-gold rounded-full inline-block"></span>
                                    {category.section}
                                </h2>
                                
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    {category.items.map((item, i) => (
                                        <div key={i} className="avoid-break print-force-block bg-white p-6 rounded-2xl border-2 border-gray-100 border-r-[6px] border-r-gold shadow-sm hover:shadow-md transition-shadow flex flex-col h-full print-border">
                                            <h3 className="font-heading text-xl font-bold text-navyLight mb-3">
                                                {item.title}

                                            <p className="text-sm text-gray-600 font-medium leading-relaxed mb-5 flex-1">

                                                <div className="pt-4 border-t border-gray-100 space-y-2">
                                                    {item.links.map((link, j) => (
                                                        <a key={j} href={link.url} target="_blank" className="w-full bg-slate-50 border border-slate-200 print-bg-btn text-navy px-4 py-2.5 rounded-lg text-[13px] font-bold hover:border-gold hover:text-gold transition-colors flex items-center gap-2">

                                                        </a>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </section>
                        ))}
                    </div>

                    {/* الخاتمة (تصميم فخم ومختلف للطباعة) */}
                    <div className="page-break mt-12 avoid-break">
                        <div className="bg-navy print-bg-navy text-white rounded-3xl p-10 md:p-14 text-center border-4 border-gold/30 relative overflow-hidden">
