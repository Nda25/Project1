                            { label: "تجارب وشرح الطالبات", url: "https://drive.google.com/drive/folders/12NXTdmhSWuTW6TvjOnhGZZ_ieedcEhZo" },

                    },

                        id: "2.19", title: "الإلمام بالفروق الفردية", 
                        concept: <span>التصميم العكسي للتدريس ليتوافق مع <strong>تنوع مستويات وأنماط تعلم الطالبات</strong>.</span>,
                        application: <span>توفير <strong>بدائل تعليمية متمايزة</strong>: رفع ملخصات على منصة (Nx) للمتعلمين بصرياً، وتفعيل المحاكاة للمتعلمين حركياً، مع تطبيق <strong>(تدريس الأقران) كإثراء للمتفوقات</strong> كعلاج أكاديمي.</span>, 
                        links: [{ label: "تقرير مراعاة الفروق الفردية", url: "https://nda25.github.io/Project1/individual_diff.pdf" }] 
                    },
                    { 
                        id: "2.20", title: "تقديم برامج تدريبية", 
                        concept: <span><strong>نقل الأثر والخبرة المهنية</strong> للزميلات في التخصص وعلى مستوى المدرسة.</span>,
                        application: <span>إعداد وتقديم برامج نوعية متنوعة تشمل: تقديم <strong>(دروس تطبيقية مُحكمة)</strong> لتبادل الخبرات داخل الغرفة الصفية، بالإضافة إلى تنفيذ <strong>ورش عمل تطبيقية متخصصة</strong> كدورة (تطبيقات الذكاء الاصطناعي في كانفا).</span>, 
                        links: [{ label: "شواهد البرامج والدروس التطبيقية", url: "https://drive.google.com/drive/folders/1EfBIqZW5_pwEjZFMVG7rWWMJA2To7Gdw" }]

                            <p className="text-base lg:text-lg font-semibold text-gray-700 leading-relaxed max-w-4xl mx-auto px-6">

                                <br/><br/>
                                هذا الملف هو حصيلة جهدٍ وعطاءٍ متواصل، يوثق تحقيق مؤشرات الجودة والإنتاجية من خلال دمج التقنية، واستراتيجيات التعلم النشط، والربط برؤية المملكة 2030.
                            </p>
                            
                            <div className="flex justify-center gap-6 mt-12">
                                <a href="https://nda25.github.io/Project1/nam.pdf" target="_blank" className="text-navy underline font-bold text-lg">🔗 نموذج التقديم على الجائزة</a>
                                <span className="text-gray-300">|</span>
                                <a href="https://nda25.github.io/Project1/nada.pdf" target="_blank" className="text-navy underline font-bold text-lg">🔗 الرخصة المهنية</a>

                    <div className="max-w-4xl mx-auto px-6 py-10">
                        {portfolioData.map((category, idx) => (
                            <div key={idx} className="page-break">

                                <div className="border-b-4 border-gold pb-4 mb-8 flex items-center justify-between">
                                    <h2 className="font-heading text-2xl lg:text-3xl font-black text-navy">{category.section}</h2>
                                    <span className="text-sm font-bold text-gray-500">ملف الإنجاز المهني | ندى المجيرش</span>
                                </div>
                                
                                <div className="space-y-10">
                                    {category.items.map(item => (
                                        <div key={item.id} className="avoid-break">
                                            {/* عنوان البند */}
                                            <div className="flex items-center gap-3 mb-4">

                                                {/* الشواهد والروابط */}
                                                <div className="pt-2">

                                                                    <span className="underline decoration-gold/30 underline-offset-4">{link.label}</span>
