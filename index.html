<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملف الإنجاز المهني | أ. ندى المجيرش</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@500;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Cairo', 'sans-serif'], heading: ['Tajawal', 'sans-serif'] },
                    colors: { navy: '#0F172A', navyLight: '#1E293B', gold: '#C5A059', bglight: '#F8FAFC' }
                }
            }
        }
    </script>
    <style>
        body { 
            background-color: #f3f4f6; 
            color: #1e293b; 
            -webkit-print-color-adjust: exact !important; 
            print-color-adjust: exact !important; 
        }
        /* إعدادات الطباعة الاحترافية */
        @page { size: A4; margin: 10mm 15mm; }
        @media print {
            body { background-color: #ffffff !important; font-size: 13pt; }
            .no-print { display: none !important; }
            .avoid-break { break-inside: avoid !important; page-break-inside: avoid !important; }
            /* منع ظهور الروابط كنصوص في بعض المتصفحات */
            a[href]:after { content: none !important; }
            .print-border { border: 1px solid #cbd5e1 !important; }
            .print-shadow-none { box-shadow: none !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const portfolioData = [
            {
                section: "أولاً: التخطيط والإعداد المسبق",
                items: [
                    { 
                        title: "توزيع المنهج الدراسي", 
                        concept: "بناء خطة زمنية دقيقة لتوزيع المقررات الدراسية تتوافق مع الأوزان النسبية للأسابيع الدراسية وتضمن ختم المنهج في الوقت المحدد.",
                        links: [{ label: "توزيع خطة الفصل الأول", url: "dd.pdf" }, { label: "توزيع خطة الفصل الثاني", url: "cc.pdf" }] 
                    },
                    { 
                        title: "الخطط التفصيلية وإدارة الطوارئ", 
                        concept: "تصميم الدروس اليومية وفق مستويات بلوم العليا، مع تجهيز خطط بديلة وحقائب تفاعلية لحصص الاحتياط لضمان استمرارية التعلم.",
                        links: [{ label: "الخطة التفصيلية للدروس", url: "Plan.pdf" }, { label: "خطة مهارات التفكير العليا", url: "https://drive.google.com/drive/folders/180Io-M2v3fBxzMythe4Dlxycw8nN9tnH" }, { label: "شواهد تفعيل حصص الاحتياط", url: "https://drive.google.com/drive/folders/1NVXdT20YX2Or6d0USSC1Mzip41l6ksf2" }]
                    }
                ]
            },
            {
                section: "ثانياً: القياس والتقويم",
                items: [
                    { 
                        title: "أدوات القياس المتنوعة", 
                        concept: "إعداد اختبارات وأوراق عمل موضوعية ومحكمة تقيس بدقة مدى تحقق نواتج التعلم، مع تفعيل التقييم الذاتي للطالبات.",
                        links: [{ label: "نموذج اختبار (1)", url: "test1.pdf" }, { label: "نموذج اختبار (2)", url: "test2.pdf" }, { label: "نماذج التقييم الذاتي للطالبات", url: "https://drive.google.com/drive/folders/166FyHf1F4DmmIu3BwyAe-VlfPc4m75yc" }]
                    },
                    { 
                        title: "مراعاة الفروق الفردية", 
                        concept: "التصميم العكسي للتدريس عبر توفير بدائل متمايزة للتعلم (بصري، حركي)، وتطبيق استراتيجية تدريس الأقران كإثراء للمتفوقات.",
                        links: [{ label: "تقرير الفروق الفردية", url: "individual_diff.pdf" }, { label: "فيديو تطبيق تدريس الأقران", url: "https://youtu.be/w9B5sYzYrlE?si=fAotddWFnHQypqmb" }]
                    }
                ]
            },
            {
                section: "ثالثاً: الاستراتيجيات والابتكار التقني",
                items: [
                    { 
                        title: "توظيف الذكاء الاصطناعي (منصة أثر)", 
                        concept: "ابتكار وتطوير (منصة أثر) التوليدية كحل تقني لتسريع عملية التخطيط المدرسي وابتكار استراتيجيات تفاعلية تقلل من العبء المعرفي على المعلم.",
                        links: [{ label: "رابط منصة أثر", url: "https://n-athar.co" }, { label: "تقرير مبادرة المنصة", url: "athar_report.pdf" }]
                    },
                    { 
                        title: "المحاكاة الرقمية والألعاب", 
                        concept: "استخدام استراتيجية المحاكاة الرقمية (PhET) لتبسيط المفاهيم الفيزيائية المجردة، وتصميم حقائب ألعاب بـ (Canva) لكسر الجمود الصفي.",
                        links: [{ label: "شواهد تطبيق المحاكاة (PhET)", url: "https://drive.google.com/drive/folders/18QlC7a2q_2Z9p1M6ZKHdSOXosGm9dK95" }, { label: "تقرير حقيبة ألعاب كانفا", url: "canva_report.pdf" }, { label: "بطاقات الاستراتيجيات", url: "https://drive.google.com/drive/folders/1oGDnB3IhAbMBEPHvg4dZbLriOPWrj8-T" }]
                    }
                ]
            },
            {
                section: "رابعاً: المخرجات والأنشطة الطلابية",
                items: [
                    { 
                        title: "الرحلات والمنافسات العالمية", 
                        concept: "تأهيل الطالبات وتدريبهن للمشاركة في المسابقة العالمية للذكاء الاصطناعي (WAICY)، وربطهن بالمؤسسات الوطنية عبر الرحلات الميدانية.",
                        links: [{ label: "شهادات مسابقة (WAICY)", url: "https://drive.google.com/drive/folders/1rxBTVJ8XGidiWpI0p-sVZe5TOpFOlbNi" }, { label: "زيارة مدينة الملك عبدالعزيز (KACST)", url: "https://drive.google.com/drive/folders/1Jyjape3y7dyTEQN3o6LwMSGtswb0rGIl" }] 
                    },
                    { 
                        title: "الأبحاث ومشاريع (STEM)", 
                        concept: "تحويل الطالبات لباحثات عبر تفعيل المكتبات الرقمية وإنتاج مشاريع تدمج الفيزياء بالهندسة وربطها برؤية المملكة 2030 (كالتغير المناخي).",
                        links: [{ label: "مشاريع الطالبات (STEM)", url: "https://drive.google.com/drive/folders/1-4pthTfiLT4NkEIDmB0CAxCUIQiXfhoU" }, { label: "الأبحاث العلمية المعتمدة", url: "https://drive.google.com/drive/folders/1MkY9Zf_SrFEWRzH7IDQB3QmF-Dp_2zIe" }, { label: "شواهد الربط بالوطن والمناخ", url: "https://drive.google.com/drive/folders/1h0tFn1_p_9ZcFO9XSHS9GfDLY644ytpl" }] 
                    },
                    { 
                        title: "المسؤولية المجتمعية", 
                        concept: "غرس القيم الإيجابية عبر إشراك الطالبات في مبادرات العمل التطوعي كحملات كسوة الشتاء، وحوكمة وتنظيم البيئة المدرسية.",
                        links: [{ label: "مبادرات العمل التطوعي", url: "https://drive.google.com/drive/folders/1kablG2gj-3EgqqEiyzslHJZwmXwVTRFC" }, { label: "حوكمة وتنظيم المعمل", url: "https://drive.google.com/drive/folders/15zqvdJVEFKhfcfu5UJ2skR14o7wS1rqD" }] 
                    }
                ]
            },
            {
                section: "خامساً: التنمية المهنية المستدامة",
                items: [
                    { 
                        title: "مجتمعات التعلم والتدريب", 
                        concept: "نقل الخبرات عبر الدروس التطبيقية، وحضور البرامج التدريبية المتخصصة، وتفعيل مجتمعات التعلم المهنية (PLC) بشكل دوري.",
                        links: [{ label: "سجل الدورات التدريبية", url: "https://drive.google.com/drive/folders/1xya-WXw4wqnmvEluEnV44HTmXL0ANHvf" }, { label: "تقرير مجتمعات التعلم (PLC)", url: "plc_report.pdf" }, { label: "استمارة زيارة تبادلية", url: "peer_visit.pdf" }, { label: "خطة التطوير المهني", url: "pd_plan.pdf" }]
                    }
                ]
            },
            {
                section: "سادساً: الأداء الوظيفي ورضا المستفيدين",
                items: [
                    { 
                        title: "التميز والانضباط الوظيفي", 
                        concept: "تحقيق التميز في الأداء الوظيفي (100%) نتيجة الالتزام بالخطط الإجرائية، والانضباط العالي، والتطوير المستمر للممارسات الصفية.",
                        links: [{ label: "تقييم الأداء السنوي (100%)", url: "eval_this_year.pdf" }, { label: "تحليل الأداء الوظيفي", url: "analysis_report.pdf" }, { label: "شواهد الانضباط (البصمة)", url: "https://drive.google.com/drive/folders/16q7LHOfvFlMiVRh2n_knjYlaW0_CBg83" }, { label: "الخطة الإجرائية للتحسين", url: "action_plan.pdf" }]
                    },
                    { 
                        title: "قياس أثر التعلم", 
                        concept: "توزيع استبانات دورية رقمية للطالبات وأولياء الأمور لقياس مؤشرات الرضا، وتوظيف التغذية الراجعة في تحسين نواتج التعلم.",
                        links: [{ label: "نتائج استطلاع المستفيدين", url: "survey.pdf" }]
                    }
                ]
            },
            {
                section: "سابعاً: الشكر والتقدير",
                items: [
                    { 
                        title: "الشهادات وخطابات الشكر", 
                        concept: "توثيق للإنجازات والجهود المبذولة من خلال خطابات الشكر والتقدير المقدمة من الإدارة المدرسية والجهات الإشرافية.",
                        links: [{ label: "سجل شهادات الشكر والتقدير", url: "https://drive.google.com/drive/folders/1OMhmmxBtGFy6Z8e6N1otBH_RvF6gb0Gk" }]
                    }
                ]
            }
        ];

        function FullPortfolio() {
            return (
                <div className="max-w-5xl mx-auto p-4 sm:p-8 font-sans text-navy">
                    
                    {/* زر الطباعة المخصص */}
                    <div className="no-print text-center mb-8 p-6 bg-white rounded-2xl shadow-sm border border-gray-200">
                        <h3 className="font-bold text-navy mb-3">تصدير الملف كـ PDF</h3>
                        <p className="text-sm text-gray-500 mb-4">للحصول على أفضل نتيجة طباعة، يرجى إزالة التحديد عن "الرؤوس والتذييلات" (Headers and footers) في إعدادات الطباعة.</p>
                        <button onClick={() => window.print()} className="bg-navy text-white px-8 py-3 rounded-xl font-bold shadow-md hover:bg-gold transition-all duration-300 flex items-center justify-center gap-2 mx-auto">
                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                            طباعة ملف الإنجاز
                        </button>
                    </div>

                    {/* صفحة الغلاف والمقدمة */}
                    <div className="bg-white rounded-3xl shadow-sm border border-gray-200 p-8 md:p-12 mb-10 print-border print-shadow-none">
                        <header className="flex justify-between items-center border-b-2 border-gray-100 pb-8 mb-10">
                            <img src="logo1.png" alt="شعار المدرسة" className="h-16 object-contain" onError={(e)=>e.target.style.display='none'} />
                            <img src="logo2.png" alt="شعار الشركة" className="h-16 object-contain" onError={(e)=>e.target.style.display='none'} />
                        </header>
                        
                        <div className="text-center max-w-3xl mx-auto">
                            <h2 className="font-heading text-3xl font-black text-navy mb-4">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</h2>
                            <div className="w-16 h-1.5 bg-gold mx-auto mb-8 rounded-full"></div>
                            
                            <h1 className="font-heading text-4xl md:text-5xl font-bold text-navyLight mb-8">ملف الإنجاز المهني المتكامل</h1>
                            
                            <div className="bg-bglight p-6 rounded-2xl border border-gray-100 mb-8 inline-block w-full max-w-md">
                                <h3 className="text-sm font-bold text-gray-500 mb-1">إعداد المعلمة</h3>
                                <h2 className="text-2xl font-black text-navy mb-2">ندى محمد المجيرش</h2>
                                <p className="text-sm font-bold text-gold">معلمة الفيزياء والهندسة - المرحلة الثانوية | NE231009</p>
                            </div>

                            <div className="text-right mt-6 space-y-6">
                                <div>
                                    <h3 className="font-black text-gold text-lg mb-2">الفلسفة التعليمية</h3>
                                    <p className="text-gray-700 font-semibold leading-relaxed text-sm md:text-base">
                                        أؤمن بأن التعليم ليس مجرد نقل للمعرفة، بل هو صناعة للأثر. رسالتي هي خلق بيئة تعليمية آمنة ومحفزة تنقل المفاهيم الفيزيائية من التجريد إلى التطبيق العملي. أسعى دائماً لتوظيف أحدث التقنيات وأدوات الذكاء الاصطناعي لتمكين الطالبات، وإعدادهن ليكنّ جيلاً باحثاً، مبتكراً، وشريكاً فاعلاً في تحقيق رؤية المملكة 2030.
                                    </p>
                                </div>
                                <div className="flex gap-4 justify-center pt-4">
                                    <a href="vision_mission.pdf" target="_blank" className="bg-white border border-gray-300 text-navy px-5 py-2 rounded-lg text-sm font-bold hover:border-gold transition-colors">الرؤية والرسالة</a>
                                    <a href="nada.pdf" target="_blank" className="bg-white border border-gray-300 text-navy px-5 py-2 rounded-lg text-sm font-bold hover:border-gold transition-colors">الرخصة المهنية</a>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* عرض البنود */}
                    <div className="space-y-8">
                        {portfolioData.map((category, idx) => (
                            <section key={idx} className="bg-white rounded-3xl shadow-sm border border-gray-200 p-6 md:p-8 print-border print-shadow-none">
                                <h2 className="font-heading text-xl md:text-2xl font-black text-navy mb-6 border-b border-gray-100 pb-4">
                                    {category.section}
                                </h2>
                                
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    {category.items.map((item, i) => (
                                        <div key={i} className="avoid-break bg-bglight p-5 rounded-2xl border border-gray-100 flex flex-col h-full">
                                            <h3 className="font-heading text-lg font-bold text-navyLight mb-2 flex items-center gap-2">
                                                <span className="w-1.5 h-1.5 bg-gold rounded-full inline-block"></span>
                                                {item.title}
                                            </h3>
                                            <p className="text-sm text-gray-600 font-semibold leading-relaxed mb-4 flex-1">
                                                {item.concept}
                                            </p>
                                            
                                            <div className="pt-4 border-t border-gray-200 space-y-2">
                                                <p className="text-[11px] font-bold text-gray-400 mb-1">الشواهد والمرفقات:</p>
                                                {item.links.map((link, j) => (
                                                    <a key={j} href={link.url} target="_blank" className="block w-full bg-white border border-gray-200 text-navy px-3 py-2 rounded-lg text-xs font-bold hover:border-gold hover:text-gold transition-colors truncate">
                                                        📄 {link.label}
                                                    </a>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        ))}
                    </div>

                    {/* الخاتمة */}
                    <div className="bg-white rounded-3xl shadow-sm border border-gray-200 p-8 mt-8 text-center print-border print-shadow-none avoid-break">
                        <h3 className="font-heading text-xl font-black text-gold mb-3">خاتمة</h3>
                        <p className="text-gray-700 text-sm md:text-base font-semibold leading-relaxed max-w-3xl mx-auto">
                            ختاماً، إن هذا الملف ليس إلا توثيقاً لرحلة مستمرة من التعلم والعطاء. أتقدم بخالص الشكر والامتنان لإدارة المرحلة الثانوية بمدارس التربية النموذجية (مجمع الريان) على الدعم المستمر والتوجيه السديد الذي ساهم في تجويد ممارساتي المهنية. وما توفيقي إلا بالله، عليه توكلت وإليه أنيب.
                        </p>
                    </div>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<FullPortfolio />);
    </script>
</body>
</html>
