                            <p className="text-xs font-bold opacity-80">الجودة والإنتاجية</p>

                                            const isActive = activeItem.id === item.id;
                                            return (
                                                <li key={item.id}>
                                                    <button 
                                                        onClick={() => {setActiveItem(item); setIsMenuOpen(false); window.scrollTo(0,0);}}

                                                        <span className={`font-bold ml-2 ${isActive ? 'text-white' : 'text-gold'}`}>{item.id}</span>

                                    <div>
                                        <h3 className="text-base font-black text-navyLight mb-3 flex items-center gap-2">
                                            <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M11.3 1.046A12.014 12.014 0 0010.3 1 12.015 12.015 0 009.29 1.046..."></path><path d="M19.342 9.406c..."></path><path fillRule="evenodd" d="M10 2a8 8 0 100 16 8 8 0 000-16zm-1 9V6a1 1 0 112 0v4h2a1 1 0 110 2h-3a1 1 0 01-1-1z" clipRule="evenodd"></path></svg>
                                            آلية التطبيق
                                        </h3>
                                        <p className="text-gray-600 text-base leading-relaxed p-2">{activeItem.application}</p>
                                    </div>
                                </div>

                                {/* منطقة الشواهد */}
                                <div className="bg-gray-50 p-6 border-t border-gray-100 flex flex-wrap gap-3">
                                    {activeItem.links.map((link, i) => (
                                        <a key={i} href={link.url} target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-2 bg-white border border-gray-200 text-navy hover:bg-gold hover:text-white hover:border-gold px-4 py-2.5 rounded-lg shadow-sm text-sm font-bold transition-all duration-200">
                                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                                            {link.label}
                                        </a>
                                    ))}
                                </div>
                            </div>
                        </div>

                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Portfolio />);
    </script>
</body>
</html>
