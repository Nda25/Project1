<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملف الإنجاز المهني الشامل | ندى المجيرش</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@500;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Cairo', 'sans-serif'], heading: ['Tajawal', 'sans-serif'] },
                    colors: { navy: '#0F172A', navyLight: '#1E293B', gold: '#C5A059', bglight: '#F8FAFC' }
                }
            }
        }
    </script>
    <style>
        body { background-color: #ffffff; color: #1e293b; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        @page { size: A4; margin: 12mm 15mm; }
        .page-break { page-break-before: always; }
        .avoid-break { break-inside: avoid; page-break-inside: avoid; }
        .cover-page { height: 260mm; display: flex; flex-direction: column; justify-content: center; }
        a { text-decoration: none !important; }
        @media print {
            .no-print { display: none !important; }
            .print-border { border: 1px solid #e2e8f0 !important; }
            .print-bg-light { background-color: #F8FAFC !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const portfolioData = [
            {
                section: "أولاً: بطاقة الهوية المهنية والتخطيط",
                items: [
                    { 
                        title: "التعريف المهني والرسالة", 
                        concept: "ندى محمد المجيرش، معلمة فيزياء وهندسة، خريجة جامعة الإمام محمد بن سعود الإسلامية. أعمل على تجويد البيئة التعليمية عبر دمج التقنية والابتكار لتحقيق نواتج تعلم رائدة.",
                        links: [{ label: "الرخصة المهنية المعتمدة", url: "https://nda25.github.io/Project1/nada.pdf" }, { label: "وثيقة الرؤية والرسالة", url: "https://nda25.github.io/Project1/vision_mission.pdf" }] 
                    },
                    { 
                        title: "التخطيط الاستراتيجي للدروس", 
                        concept: "بناء خطط فصلية وأسبوعية محكمة تراعي مستويات بلوم، مع توفير بدائل مرنة لحصص الاحتياط لضمان عدم هدر الوقت التعليمي.",
                        links: [{ label: "توزيع المنهج (ف1+ف2)", url: "https://nda25.github.io/Project1/dd.pdf" }, { label: "خطة مهارات التفكير العليا", url: "https://drive.google.com/drive/folders/180Io-M2v3fBxzMythe4Dlxycw8nN9tnH" }]
                    }
                ]
            },
            {
                section: "ثانياً: التقويم ونواتج التعلم",
                items: [
                    { 
                        title: "أدوات القياس والتقويم المبتكرة", 
                        concept: "تصميم اختبارات دورية (test1, test2) وأوراق عمل تفاعلية تقيس الفهم العميق، مع تقارير شاملة لمراعاة الفروق الفردية بين الطالبات.",
                        links: [{ label: "نموذج اختبار (1)", url: "test1.pdf" }, { label: "نموذج اختبار (2)", url: "test2.pdf" }, { label: "تقرير الفروق الفردية", url: "https://nda25.github.io/Project1/individual_diff.pdf" }]
                    }
                ]
            },
            {
                section: "ثالثاً: المبادرات والابتكار (نقطة القوة)",
                items: [
                    { 
                        title: "منصة 'أثـر' والتحول الرقمي", 
                        concept: "مبادرة وُلدت من رحم احتياج الميدان؛ منصة تعتمد على الذكاء الاصطناعي لتطوير التخطيط المدرسي، بالإضافة لتطبيق استراتيجيات المحاكاة الرقمية (PhET).",
                        links: [{ label: "رابط منصة أثر", url: "https://n-athar.co" }, { label: "تقرير مبادرة المحاكاة (PhET)", url: "https://drive.google.com/drive/folders/18QlC7a2q_2Z9p1M6ZKHdSOXosGm9dK95" }, { label: "حوكمة معمل الفيزياء", url: "https://drive.google.com/drive/folders/15zqvdJVEFKhfcfu5UJ2skR14o7wS1rqD" }]
                    }
                ]
            },
            {
                section: "رابعاً: الأداء الوظيفي ورضا المستفيدين",
                items: [
                    { 
                        title: "التميز في الأداء السنوي (100/100)", 
                        concept: "تحقيق الدرجة النهائية في تقييم الأداء الوظيفي، مع الالتزام التام بالخطط الإجرائية ومعالجة فرص التحسين بمهنية عالية.",
                        links: [{ label: "تقييم الأداء الحالي (100%)", url: "https://nda25.github.io/Project1/eval_this_year.pdf" }, { label: "دراسة تحليل الأداء", url: "https://nda25.github.io/Project1/analysis_report.pdf" }, { label: "شواهد الانضباط (البصمة)", url: "https://drive.google.com/drive/folders/16q7LHOfvFlMiVRh2n_knjYlaW0_CBg83" }]
                    },
                    { 
                        title: "قياس رضا الطالبات وأولياء الأمور", 
                        concept: "توظيف التغذية الراجعة من خلال استبانات دورية رقمية، أثبتت نتائجها ارتفاع مستوى الرضا عن الأساليب التدريسية والبيئة الصفية.",
                        links: [{ label: "تقرير استطلاع المستفيدين (الآراء)", url: "https://nda25.github.io/Project1/survey.pdf" }]
                    }
                ]
            },
            {
                section: "خامساً: شهادات الشكر والتقدير المهني",
                items: [
                    { 
                        title: "خطابات الشكر والتقدير", 
                        concept: "سجل حافل بالتكريم من الإدارة والمشرفات التربويات، تقديراً للجهود المتميزة في تفعيل المختبرات، تقديم الدروس التطبيقية، والابتكار التقني.",
                        links: [{ label: "سجل شهادات الشكر والتقدير", url: "https://drive.google.com/drive/folders/1YB3YIBdaZQYTz7f3xD9Z0sf5bPsud-iq" }]
                    }
                ]
            },
            {
                section: "سادساً: الإنجازات الطلابية والمنافسات",
                items: [
                    { 
                        title: "المشاركات العالمية (WAICY)", 
                        concept: "قيادة الطالبات وتمكينهن للمشاركة في المسابقة العالمية للذكاء الاصطناعي، مما يعزز مهارات القرن 21 والقدرة على المنافسة الدولية.",
                        links: [{ label: "شهادات مسابقة WAICY", url: "https://drive.google.com/drive/folders/1rxBTVJ8XGidiWpI0p-sVZe5TOpFOlbNi" }, { label: "أبحاث الطالبات المتقدمة", url: "https://drive.google.com/drive/folders/1MkY9Zf_SrFEWRzH7IDQB3QmF-Dp_2zIe" }] 
                    },
                    { 
                        title: "المسؤولية المجتمعية والرحلات", 
                        concept: "ربط المادة بالواقع عبر زيارات ميدانية (KACST) ومبادرات تطوعية (كسوة الشتاء)، لتعزيز الانتماء الوطني والمسؤولية الذاتية.",
                        links: [{ label: "توثيق زيارة KACST", url: "https://drive.google.com/drive/folders/1Jyjape3y7dyTEQN3o6LwMSGtswb0rGIl" }, { label: "مبادرات العمل التطوعي", url: "https://drive.google.com/drive/folders/1kablG2gj-3EgqqEiyzslHJZwmXwVTRFC" }] 
                    }
                ]
            },
            {
                section: "سابعاً: النمو المهني وامتداد الأثر",
                items: [
                    { 
                        title: "التطوير المهني المستمر", 
                        concept: "الالتزام بخطة تطوير مهني شاملة، تشمل حضور الدورات المكثفة وتفعيل مجتمعات التعلم (PLC) لنقل الأثر للزميلات في التخصص.",
                        links: [{ label: "سجل الدورات والحضور", url: "https://drive.google.com/drive/folders/1xya-WXw4wqnmvEluEnV44HTmXL0ANHvf" }, { label: "تقرير مجتمعات التعلم PLC", url: "https://nda25.github.io/Project1/plc_report.pdf" }, { label: "شواهد الدروس التطبيقية", url: "https://drive.google.com/drive/folders/1EfBIqZW5_pwEjZFMVG7rWWMJA2To7Gdw" }] 
                    }
                ]
            }
        ];

        function TeacherPortfolio() {
            return (
                <div className="max-w-4xl mx-auto p-4 sm:p-8">
                    
                    {/* زر الطباعة */}
                    <div className="no-print text-center mb-8 p-4 bg-gray-50 rounded-xl border border-dashed border-navy/20">
                        <button onClick={() => window.print()} className="bg-navy text-white px-8 py-3 rounded-lg font-bold shadow-lg hover:bg-gold transition-all">
                            تصدير ملف الإنجاز الشامل (PDF)
                        </button>
                    </div>

                    {/* الغلاف */}
                    <div className="cover-page text-center border-8 border-double border-gold/20 p-10 mb-12 flex flex-col justify-center">
                        <div className="flex justify-between mb-20">
                            <img src="logo1.png" className="h-20 object-contain" onError={(e)=>e.target.style.display='none'} />
                            <img src="logo2.png" className="h-20 object-contain" onError={(e)=>e.target.style.display='none'} />
                        </div>
                        <h2 className="font-heading text-4xl font-black text-navy mb-4">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</h2>
                        <div className="w-20 h-2 bg-gold mx-auto mb-10 rounded-full"></div>
                        <h1 className="font-heading text-4xl lg:text-5xl font-bold text-navyLight mb-16">ملف الإنجاز المهني المتكامل</h1>
                        <div className="bg-bglight p-8 rounded-2xl border border-gray-200 inline-block mx-auto mb-10">
                            <h3 className="text-xl font-bold text-gray-500 mb-2">إعداد المعلمة</h3>
                            <h2 className="text-3xl font-black text-navy">ندى محمد المجيرش</h2>
                            <p className="text-lg font-bold text-gold mt-2">معلمة فيزياء وهندسة | NE231009</p>
                        </div>
                    </div>

                    {/* المحتوى */}
                    {portfolioData.map((category, idx) => (
                        <div key={idx} className="page-break py-6">
                            <h2 className="font-heading text-2xl font-black text-navy border-b-4 border-gold pb-2 mb-8">{category.section}</h2>
                            <div className="space-y-8">
                                {category.items.map((item, i) => (
                                    <div key={i} className="avoid-break print-border border border-gray-100 p-6 rounded-2xl bg-white shadow-sm">
                                        <h3 className="font-heading text-xl font-bold text-navyLight mb-3 pr-3 border-r-4 border-gold">{item.title}</h3>
                                        <p className="text-gray-700 text-sm leading-relaxed mb-4 bg-bglight p-4 rounded-xl">{item.concept}</p>
                                        <div className="flex flex-wrap gap-4 pt-2">
                                            {item.links.map((link, j) => (
                                                <a key={j} href={link.url} target="_blank" className="text-xs font-black text-navy underline decoration-gold underline-offset-4 flex items-center gap-1">
                                                    <svg className="w-4 h-4 text-gold" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                                                    {link.label}
                                                </a>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    ))}

                    <footer className="text-center py-10 border-t border-gray-200 mt-10">
                        <p className="font-black text-navy">ندى محمد المجيرش - ملف الإنجاز الشامل</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TeacherPortfolio />);
    </script>
</body>
</html>
