                                </p>
                                <p>
                                    يضم الملف شواهد حية على التخطيط الاستراتيجي، والمبادرات التقنية، ونواتج تعلم الطالبات، والنمو المهني المستمر، سائلاً المولى عز وجل أن يكون هذا العمل خالصاً لوجهه الكريم ونافعاً للميدان التعليمي.
                                </p>
                            </div>
                        </div>
                    </div>

                    {/* الأقسام الرئيسية */}
                    {portfolioData.map((category, idx) => (
                        <div key={idx} className="page-container page-break bg-white py-16">
                            <div className="max-w-5xl mx-auto">
                                {/* عنوان القسم الملون */}
                                <div className={`flex items-center gap-6 mb-16 p-8 rounded-[2.5rem] bg-${category.color}-50 border-r-[12px] border-${category.color}-500 shadow-sm`}>
                                    <div className={`w-16 h-16 bg-${category.color}-500 text-white rounded-2xl flex items-center justify-center shadow-lg`}>
                                        <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d={category.icon}></path>
                                        </svg>
                                    </div>
                                    <div>
                                        <p className={`text-${category.color}-600 font-black text-sm mb-1 uppercase tracking-widest`}>Section {idx + 1}</p>
                                        <h2 className={`font-heading text-4xl font-black text-navy`}>{category.section}</h2>
                                    </div>
                                </div>
                                
                                <div className="grid grid-cols-1 gap-10">
                                    {category.items.map((item, i) => (
                                        <div key={i} className={`avoid-break section-card bg-white p-10 rounded-[3rem] border-2 border-gray-100 shadow-xl relative overflow-hidden`}>
                                            {/* شريط جانبي ملون */}
                                            <div className={`absolute top-0 right-0 w-3 h-full bg-${category.color}-500`}></div>
                                            
                                            <h3 className="font-heading text-3xl font-black text-navyLight mb-6 flex items-center gap-4">
                                                <span className={`w-4 h-4 bg-${category.color}-500 rounded-full shadow-lg`}></span>
                                                {item.title}
                                            </h3>
                                            
                                            <div className={`text-gray-600 text-xl leading-relaxed mb-10 bg-${category.color}-50/30 p-8 rounded-[2rem] border border-${category.color}-100/50`}>
                                                {item.concept}
                                            </div>
                                            
                                            <div className="flex flex-wrap gap-6">
                                                {item.links.map((link, j) => (
                                                    <a 
                                                        key={j} 
                                                        href={link.url} 
                                                        target="_blank" 
                                                        className={`btn-vibrant bg-white border-2 border-${category.color}-200 px-8 py-4 rounded-2xl text-lg font-black text-navy hover:bg-${category.color}-500 hover:text-white hover:border-${category.color}-500 flex items-center gap-3 shadow-md`}
                                                    >
                                                        <svg className={`w-6 h-6 text-${category.color}-500 group-hover:text-white`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                                                        {link.label}
                                                    </a>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    ))}

                    {/* الخاتمة */}
                    <div className="page-container page-break bg-white py-20">
                        <div className="max-w-4xl mx-auto">
                            <div className="bg-navy text-white p-16 rounded-[4rem] shadow-2xl relative overflow-hidden">
                                <div className="absolute top-0 right-0 w-96 h-96 bg-gold/10 rounded-full -mr-48 -mt-48"></div>
                                <div className="absolute bottom-0 left-0 w-64 h-64 bg-white/5 rounded-full -ml-32 -mb-32"></div>
                                
                                <h2 className="font-heading text-5xl font-black mb-12 border-r-8 border-gold pr-6">خاتمة</h2>
                                
                                <p className="text-2xl leading-[2] relative z-10 mb-10">
                                    في ختام هذا الملف، أجدد العهد على مواصلة العطاء وتطوير الذات، مستمدة العون من الله عز وجل، ثم من الدعم اللامحدود الذي يحظى به قطاع التعليم في وطننا الغالي.
                                </p>
                                <p className="text-2xl leading-[2] relative z-10">
                                    إن الإنجاز الحقيقي ليس في توثيق الأوراق، بل في الأثر الذي نتركه في نفوس طالباتنا، وفي العقول التي نساهم في صياغتها لتكون لبنات صالحة في بناء نهضة المملكة. شكراً لكل من ساند ووجه، والقادم أجمل بإذن الله.
                                </p>
                                
                                <div className="mt-20 pt-12 border-t border-white/10 flex justify-between items-end relative z-10">
                                    <div>
                                        <p className="text-gold font-black text-xl mb-2">المعلمة:</p>
                                        <p className="text-4xl font-black">ندى محمد المجيرش</p>
                                    </div>
                                    <div className="text-left">
                                        <p className="text-lg opacity-60 font-bold">تحريراً في عام</p>
                                        <p className="text-2xl font-black text-gold">1447 هـ</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <footer className="text-center py-12 bg-gray-50 no-print">
                        <p className="font-black text-navy/40 text-lg">جميع الحقوق محفوظة © ندى محمد المجيرش - 2026</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TeacherPortfolio />);
    </script>
</body>
</html>
