                            { label: "الأنشطة الصفية", url: "https://drive.google.com/drive/folders/1oGDnB3IhAbMBEPHvg4dZbLriOPWrj8-T" },
                            { label: "شواهد مرئية لتفعيل المعمل (فيديو)", url: "https://drive.google.com/drive/folders/1teUwnCOlx67fMMTweZdlAgOS2BYmeomm" },
                            { label: "شواهد التحفيز والتعزيز (شهادات وهدايا)", url: "https://drive.google.com/drive/folders/1YB3YIBdaZQYTz7f3xD9Z0sf5bPsud-iq" }
                        ] 
                    },
                    { 
                        id: "2.18", title: "خبرات صفية ولا صفية", 
                        concept: <span>تنمية الشعور <strong>بالمسؤولية الذاتية والمجتمعية</strong> وتفعيل دور الطالبة كعضو فاعل ومؤثر.</span>,
                        application: <span>إشراك الطالبات في <strong>مبادرات تطوعية لا صفية</strong> تعزز المسؤولية نحو الآخرين (حملة كسوة الشتاء)، ونحو البيئة المدرسية (تهيئة المصلى وتنظيم المعمل). بالإضافة إلى <strong>تأهيلهن للمشاركة في المسابقة العالمية للذكاء الاصطناعي (WAICY)</strong>، وتنظيم <strong>رحلات علمية ميدانية (KACST)</strong>، وتفعيل <strong>تدريس الأقران</strong>.</span>, 
                        links: [
                            { label: "تجارب وشرح الطالبات", url: "https://drive.google.com/drive/folders/12NXTdmhSWuTW6TvjOnhGZZ_ieedcEhZo" },
                            { label: "مبادرات العمل التطوعي (كسوة الشتاء، مصلى، وتنظيم)", url: "https://drive.google.com/drive/folders/1kablG2gj-3EgqqEiyzslHJZwmXwVTRFC" },
                            { label: "المشاركة بمسابقة الذكاء الاصطناعي (WAICY)", url: "https://drive.google.com/drive/folders/1rxBTVJ8XGidiWpI0p-sVZe5TOpFOlbNi" },
                            { label: "رحلة مدينة الملك عبدالعزيز للعلوم والتقنية", url: "https://drive.google.com/drive/folders/1Jyjape3y7dyTEQN3o6LwMSGtswb0rGIl" }
                        ] 
                    },
                    { 
                        id: "2.19", title: "الإلمام بالفروق الفردية", 
                        concept: <span>التصميم العكسي للتدريس ليتوافق مع <strong>تنوع مستويات وأنماط تعلم الطالبات</strong> (البصرية، الحركية).</span>,
                        application: <span>توفير <strong>بدائل تعليمية متمايزة</strong>: رفع ملخصات على منصة (Nx) للمتعلمين بصرياً، وتفعيل المحاكاة للمتعلمين حركياً، مع تطبيق <strong>(تدريس الأقران) كإثراء للمتفوقات</strong>، ومتابعة الحلول المباشرة وتصحيح المفاهيم البديلة <strong>كعلاج أكاديمي لدون المتوسط</strong>.</span>, 
                        links: [{ label: "تقرير مراعاة الفروق الفردية.pdf", url: "individual_diff.pdf" }] 
                    },
                    { 
                        id: "2.20", title: "تقديم برامج تدريبية", 
                        concept: <span><strong>نقل الأثر والخبرة المهنية</strong> للزميلات في التخصص وعلى مستوى المدرسة.</span>,
                        application: <span>إعداد وتقديم برامج نوعية متنوعة تشمل: تقديم <strong>(دروس تطبيقية مُحكمة)</strong> لتبادل الخبرات داخل الغرفة الصفية، بالإضافة إلى تنفيذ <strong>ورش عمل تطبيقية متخصصة</strong> كدورة (تطبيقات الذكاء الاصطناعي في كانفا).</span>, 
                        links: [{ label: "شواهد البرامج والدروس التطبيقية", url: "https://drive.google.com/drive/folders/1EfBIqZW5_pwEjZFMVG7rWWMJA2To7Gdw" }] 
                    }
                ]
            }
        ];

        function PortfolioPDF() {
            return (
                <div className="bg-bglight font-sans text-navy min-h-screen pb-10">
                    
                    {/* الترويسة */}
                    <header className="bg-white p-4 shadow-sm border-b-4 border-gold break-inside-avoid">
                        <div className="max-w-4xl mx-auto flex justify-between items-center">
                            <img src="https://f.top4top.io/p_37235mo091.png" alt="شعار المدارس" className="h-12 object-contain" />
                            <div className="text-center flex-1">
                                <h1 className="font-heading text-2xl font-black text-navy mb-1">ندى محمد المجيرش</h1>
                                <p className="text-sm font-bold text-gray-600">معلمة فيزياء - المرحلة الثانوية | <span className="text-gold">NE231009</span></p>
                            </div>
                            <img src="https://k.top4top.io/p_37234u2y41.png" alt="شعار الشركة" className="h-12 object-contain" />
                        </div>
                    </header>

                    <div className="p-6 max-w-4xl mx-auto">
                        {/* المقدمة */}
                        <div className="bg-white rounded-2xl shadow-sm border border-gray-200 p-8 text-center mb-10 break-inside-avoid">
                            <h2 className="font-heading text-3xl font-black text-navy mb-4">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</h2>
                            <div className="w-20 h-1.5 bg-gold mb-6 mx-auto rounded-full"></div>
                            <h3 className="font-heading text-xl font-bold text-navyLight mb-6 bg-bglight px-4 py-2 rounded-xl inline-block border border-gray-100">ملف الإنجاز المهني - مسار الجودة والإنتاجية</h3>
                            <p className="text-gray-700 text-base leading-relaxed font-semibold mb-6">
                                الحمد لله الذي علَّم بالقلم، علَّم الإنسان ما لم يعلم، وأسبغ علينا نعمه ظاهرةً وباطنة. والصلاة والسلام على خير من علَّم البشرية وأرشدها إلى طريق الحق والهدى، نبينا محمد صلى الله عليه وسلم، وعلى آله وصحبه أجمعين.
                                <br/><br/>
                                إنَّ هذا الملف هو حصيلة جهدٍ وعطاءٍ متواصل، جمعتُ فيه ثمار عملي، وخلاصة خبرتي، وما تحقق من إنجازات خلال مسيرتي. أسأل الله أن يجعل ما قدمت خالصًا لوجهه الكريم، وأن يكون شاهدًا على الإخلاص والعمل، وخطوة نحو مزيدٍ من التطوير والتميز.
                            </p>
                            <div className="flex justify-center gap-4 mt-6">
                                <a href="nam.pdf" target="_blank" className="bg-navy text-white px-4 py-2 rounded-lg text-sm font-bold border-2 border-navy">نموذج التقديم على الجائزة</a>
                                <a href="nada.pdf" target="_blank" className="bg-white text-navy border-2 border-gray-200 px-4 py-2 rounded-lg text-sm font-bold">الرخصة المهنية</a>
                            </div>
                        </div>

                        {/* استعراض البنود */}
                        {portfolioData.map((category, idx) => (
                            <div key={idx} className="mb-10 page-break-before">
                                <h2 className="text-xl font-black text-gold mb-6 border-b-2 border-gold pb-2">{category.section}</h2>
                                <div className="space-y-6">
                                    {category.items.map(item => (
                                        <div key={item.id} className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden break-inside-avoid">
                                            <div className="bg-navy p-4 text-white flex items-center border-b-2 border-gold">
                                                <span className="font-black bg-white/10 px-3 py-1 rounded-lg text-sm ml-3">البند {item.id}</span>
                                                <h3 className="font-heading text-lg font-bold">{item.title}</h3>
                                            </div>
                                            <div className="p-5 space-y-4">
                                                <div>
                                                    <h4 className="font-black text-gold text-sm mb-1">المفهوم / الهدف</h4>
                                                    <p className="text-sm bg-bglight p-3 rounded-lg border border-gray-100 font-semibold">{item.concept}</p>
                                                </div>
                                                <div>
                                                    <h4 className="font-black text-navyLight text-sm mb-1">آلية التطبيق</h4>
                                                    <p className="text-sm text-gray-700">{item.application}</p>
                                                </div>
                                            </div>
                                            <div className="bg-gray-50 p-4 border-t border-gray-200 flex flex-wrap gap-2">
                                                {item.links.map((link, i) => (
                                                    <a key={i} href={link.url} target="_blank" className="bg-white border border-gray-200 text-navy px-3 py-1.5 rounded-lg text-xs font-bold shadow-sm">
                                                        🔗 {link.label}
                                                    </a>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PortfolioPDF />);
    </script>
</body>
</html>
