    <script type="text/babel">

        const portfolioData = [
            {
                section: "البيانات الأساسية",

                        links: [
                            { label: "الرؤية والرسالة", url: "vision_mission.pdf" },
                            { label: "الرخصة المهنية", url: "nada.pdf" }

                ]
            },
            {
                section: "التخطيط",
                items: [
                    { 
                        id: "2", title: "تحاضير وتوزيع المنهج", 
                        concept: <span>التخطيط المسبق للدروس وتوزيع المقرر بشكل منهجي.</span>,
                        application: <span>بناء خطة تشغيلية مرنة تشمل التوزيع الفصلي للمنهج، والخطط الأسبوعية التفصيلية المبنية على <strong>مستويات بلوم المعرفية</strong>، مع وضع خطط بديلة لتفعيل حصص الاحتياط.</span>, 
                        links: [

                            { label: "توزيع الفصل الثاني", url: "cc.pdf" },

                        ]
                    }
                ]
            },
            {
                section: "التقويم",
                items: [
                    {

                        links: [
                            { label: "تقرير حقيبة كانفا", url: "canva_report.pdf" },
                            { label: "شواهد تطبيق المحاكاة", url: "https://drive.google.com/drive/folders/18QlC7a2q_2Z9p1M6ZKHdSOXosGm9dK95" },
                            { label: "تقييم الطالبات لأنفسهم", url: "https://drive.google.com/drive/folders/166FyHf1F4DmmIu3BwyAe-VlfPc4m75yc" }

                        links: [
                            { label: "مشاريع الطالبات العلمية", url: "https://drive.google.com/drive/folders/1-4pthTfiLT4NkEIDmB0CAxCUIQiXfhoU" },
                            { label: "خرائط مفاهيم", url: "https://drive.google.com/drive/folders/1BG12LoQPLdLzqp85pt1MsnDJgPi98Ynn" },
                            { label: "أبحاث الطالبات المعتمدة", url: "https://drive.google.com/drive/folders/1MkY9Zf_SrFEWRzH7IDQB3QmF-Dp_2zIe" },

            {

                        application: <span>تنفيذ أنشطة صفية محفزة، وإشراك الطالبات في مبادرات تطوعية (مثل كسوة الشتاء)، وتنظيم رحلات ميدانية مثل زيارة <strong>مدينة الملك عبدالعزيز للعلوم والتقنية</strong>، وربط الدروس بمشاريع رؤية 2030 (مثل الرياض الخضراء).</span>, 
                        links: [
                            { label: "شواهد الربط بالوطن (رؤية 2030)", url: "https://drive.google.com/drive/folders/1h0tFn1_p_9ZcFO9XSHS9GfDLY644ytpl" },
                            { label: "مبادرات العمل التطوعي", url: "https://drive.google.com/drive/folders/1kablG2gj-3EgqqEiyzslHJZwmXwVTRFC" },
                            { label: "رحلة مدينة الملك عبدالعزيز للعلوم والتقنية", url: "https://drive.google.com/drive/folders/1Jyjape3y7dyTEQN3o6LwMSGtswb0rGIl" },
                            { label: "الأنشطة الصفية", url: "https://drive.google.com/drive/folders/1oGDnB3IhAbMBEPHvg4dZbLriOPWrj8-T" }
                        ] 
                    }
                ]
            },
            {
                section: "الإنجازات",
                items: [
                    { 
                        id: "6", title: "دورات، شهادات وابتكارات", 
                        concept: <span>توثيق التميز المهني، الابتكار التقني، والشهادات المكتسبة.</span>,
                        application: <span>ابتكار <strong>منصة 'أثر'</strong> المعتمدة على الذكاء الاصطناعي لتوليد استراتيجيات التدريس، وحضور برامج تدريبية متخصصة، وتأهيل الطالبات والحصول على شهادات في <strong>المسابقة العالمية للذكاء الاصطناعي (WAICY)</strong>.</span>, 
                        links: [
                            { label: "تقرير منصة أثر", url: "athar_report.pdf" },
                            { label: "سجل الدورات وكشوفات الحضور", url: "https://drive.google.com/drive/folders/1xya-WXw4wqnmvEluEnV44HTmXL0ANHvf" },
                            { label: "شهادات مسابقة الذكاء الاصطناعي (WAICY)", url: "https://drive.google.com/drive/folders/1rxBTVJ8XGidiWpI0p-sVZe5TOpFOlbNi" },
                            { label: "نموذج التقديم على الجائزة", url: "nam.pdf" }
                        ] 
                    }
                ]
            },
            {
                section: "التطوير المهني",
                items: [
                    { 
                        id: "7", title: "مهارات وخطة تطوير",

                        links: [
                            { label: "خطة التطوير المهني", url: "pd_plan.pdf" },
                            { label: "استمارة تحديد الاحتياجات", url: "needs_assessment.pdf" },
                            { label: "تقرير مجتمعات التعلم PLC", url: "plc_report.pdf" },
                            { label: "استمارة زيارة تبادلية", url: "peer_visit.pdf" },
                            { label: "شواهد البرامج والدروس التطبيقية", url: "https://drive.google.com/drive/folders/1EfBIqZW5_pwEjZFMVG7rWWMJA2To7Gdw" }
                        ] 
                    }
                ]
            },

                items: [

                        links: [
                            { label: "دراسة تحليل الأداء", url: "analysis_report.pdf" },
                            { label: "تقييم الأداء (العام الماضي)", url: "eval_last_year.pdf" },
                            { label: "تقييم الأداء (العام الحالي)", url: "eval_this_year.pdf" },
                            { label: "الخطة الإجرائية", url: "action_plan.pdf" }

                ]
            },

        function Portfolio() {
            const [activeItem, setActiveItem] = useState(null);
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [hasOpenedMenu, setHasOpenedMenu] = useState(false);

            const handleItemClick = (e, item) => {
                e.preventDefault();
                e.stopPropagation();
                setActiveItem(item);
                setIsMenuOpen(false);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            return (
                <div className="min-h-screen bg-bglight font-sans text-navy flex flex-col relative">
                    
                    {!hasOpenedMenu && (
                        <div className="md:hidden fixed bottom-24 right-4 z-[65] flex flex-col items-center animate-float" onClick={() => { setIsMenuOpen(true); setHasOpenedMenu(true); }}>
                            <div className="bg-gold text-navy text-xs font-black py-1.5 px-3 rounded-lg shadow-xl text-center border-2 border-white relative cursor-pointer">
                                لاستعراض الملف<br/>اضغطي هنا
                                <div className="absolute -bottom-2 right-6 w-0 h-0 border-l-[6px] border-r-[6px] border-t-[8px] border-l-transparent border-r-transparent border-t-gold"></div>
                            </div>
                        </div>
                    )}

                    <button 
                        type="button"
                        onClick={() => { setIsMenuOpen(!isMenuOpen); setHasOpenedMenu(true); }}
                        className={`md:hidden fixed bottom-6 right-6 z-[60] text-white p-3.5 rounded-full shadow-2xl transition-all duration-300 ${!hasOpenedMenu ? 'bg-navy animate-pulse ring-4 ring-navy/40' : 'bg-gold hover:scale-105'}`}

                    </button>

                    {isMenuOpen && (
                        <div className="fixed inset-0 bg-black/60 z-40 md:hidden backdrop-blur-sm" onClick={() => setIsMenuOpen(false)}></div>
                    )}

                    <aside className={`fixed inset-y-0 right-0 z-50 w-64 lg:w-72 bg-navy text-white flex flex-col transition-transform duration-300 ease-in-out ${isMenuOpen ? 'translate-x-0' : 'translate-x-full'} md:translate-x-0 shadow-2xl border-l border-white/5`}>
                        <div className="p-5 text-center border-b border-white/10 bg-navyLight">
                            <h2 className="font-heading text-xl font-black text-gold mb-1">ملف الإنجاز</h2>
                            <p className="text-xs font-bold opacity-80">الفهرس والمحتويات</p>
                        </div>
                        <nav className="flex-1 overflow-y-auto p-3 custom-scrollbar">
                            
                            <button 
                                type="button"
                                onClick={() => {setActiveItem(null); setIsMenuOpen(false); window.scrollTo({ top: 0, behavior: 'smooth' });}}
                                className={`w-full text-right flex items-center gap-2 py-2.5 px-3 mb-4 text-sm font-bold rounded-lg transition-all duration-200 outline-none ${activeItem === null ? 'bg-gold text-navy shadow-md' : 'bg-white/5 text-gold hover:bg-white/10'}`}
                            >
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                                المقدمة الرئيسية
                            </button>

                            <div className="space-y-4">
                                {portfolioData.map((category, idx) => (
                                    <div key={idx} className="mb-2">
                                        <h3 className="text-gold font-bold mb-2 text-xs px-2 border-r-2 border-gold pr-2">{category.section}</h3>
                                        <ul className="space-y-1 pr-2">
                                            {category.items.map((item) => {
                                                const isActive = activeItem?.id === item.id;
                                                return (
                                                    <li key={item.id}>
                                                        <button 
                                                            type="button"
                                                            onClick={(e) => handleItemClick(e, item)}
                                                            className={`w-full text-right flex items-start gap-2 py-2 px-2.5 text-xs font-semibold rounded-lg transition-all duration-200 outline-none ${isActive ? 'bg-white/10 text-gold shadow-sm' : 'text-gray-300 hover:text-white hover:bg-white/5'}`}
                                                        >
                                                            <span className={`shrink-0 py-0.5 px-1.5 rounded text-[10px] font-black mt-0.5 ${isActive ? 'bg-gold text-navy' : 'bg-transparent text-gold'}`}>{item.id}</span>
                                                            <span className="flex-1 leading-relaxed">{item.title}</span>
                                                        </button>
                                                    </li>
                                                )
                                            })}
                                        </ul>
                                    </div>
                                ))}
                            </div>
                        </nav>
                    </aside>

                    <main className="md:mr-64 lg:mr-72 flex-1 flex flex-col min-h-screen transition-all duration-300">
                        
                        <header className="bg-white p-3 md:p-4 shadow-sm border-b-2 border-gold sticky top-0 z-30 shrink-0">
                            <div className="max-w-5xl mx-auto flex flex-row justify-between items-center gap-2">
                                <img src="https://f.top4top.io/p_37235mo091.png" alt="شعار المدارس" className="h-8 md:h-10 lg:h-12 object-contain" />
                                <div className="text-center flex-1">
                                    <h1 className="font-heading text-base md:text-lg lg:text-xl font-black text-navy mb-0.5">ندى محمد المجيرش</h1>
                                    <p className="text-[10px] md:text-xs lg:text-sm font-bold text-gray-600 flex justify-center items-center gap-1.5 flex-wrap">
                                        معلمة فيزياء - المرحلة الثانوية
                                        <span className="hidden md:inline text-gray-300">|</span>
                                        <span className="text-gold">NE231009</span>
                                    </p>
                                </div>
                                <img src="https://k.top4top.io/p_37234u2y41.png" alt="شعار الشركة" className="h-8 md:h-10 lg:h-12 object-contain" />
                            </div>
                        </header>

                        <div className="p-4 md:p-6 lg:p-8 w-full max-w-5xl mx-auto flex-1 flex flex-col justify-center">
                            
                            {activeItem === null ? (
                                <div className="fade-in bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden flex flex-col p-6 md:p-8 lg:p-10 text-center items-center justify-center relative my-auto">
                                    
                                    <h2 className="font-heading text-2xl md:text-3xl lg:text-4xl font-black text-navy mb-3 md:mb-4 z-10">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</h2>
                                    <div className="w-16 md:w-20 h-1 md:h-1.5 bg-gold mb-5 md:mb-6 mx-auto rounded-full z-10"></div>
                                    <h3 className="font-heading text-lg md:text-xl lg:text-2xl font-bold text-navyLight mb-5 md:mb-6 z-10 bg-bglight px-6 py-3 rounded-xl border border-gray-100 inline-block shadow-sm">ملف إنجاز المعلمة (البورتفوليو المهني)</h3>
                                    
                                    <p className="text-gray-700 text-sm md:text-base lg:text-lg leading-relaxed md:leading-relaxed max-w-3xl mx-auto mb-8 z-10 font-semibold text-justify" style={{textAlignLast: "center"}}>
                                        الحمد لله الذي علَّم بالقلم، علَّم الإنسان ما لم يعلم، وأسبغ علينا نعمه ظاهرةً وباطنة. والصلاة والسلام على خير من علَّم البشرية وأرشدها إلى طريق الحق والهدى، نبينا محمد صلى الله عليه وسلم، وعلى آله وصحبه أجمعين.
                                        <br/><br/>
                                        إنَّ هذا الملف يوثق مسيرتي المهنية، ويستعرض التخطيط الاستراتيجي، والمبادرات التربوية، وأعمال الطالبات، ونماذج من التقويم والتأمل الذاتي. أسأل الله أن يجعل ما قدمت خالصًا لوجهه الكريم.
                                    </p>
                                    
                                    <div className="hidden md:inline-flex bg-navy text-white px-6 py-3 rounded-xl items-center justify-center gap-3 z-10 shadow-md border-b-2 border-gold">
                                        <svg className="w-5 h-5 lg:w-6 lg:h-6 text-gold animate-bounce" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"></path></svg>
                                        <p className="font-black text-sm lg:text-base">الرجاء اختيار أحد البنود من القائمة الجانبية لاستعراض الشواهد</p>
                                    </div>

                                </div>
                            ) : (
                                <div key={activeItem.id} className="fade-in bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden flex flex-col my-auto">
                                    
                                    <div className="bg-navy p-4 md:p-5 lg:p-6 text-white flex justify-between items-center border-b-2 border-gold">
                                        <span className="font-black text-base md:text-lg bg-white/10 px-3 md:px-4 py-1.5 rounded-lg shadow-inner">القسم {activeItem.id}</span>
                                        <h2 className="font-heading text-lg md:text-xl lg:text-2xl font-bold text-right ml-3 leading-tight">{activeItem.title}</h2>
                                    </div>
                                    
                                    <div className="p-5 md:p-6 lg:p-8 space-y-6 flex-1">
                                        <div>
                                            <h3 className="text-sm md:text-base font-black text-gold mb-2 md:mb-3 flex items-center gap-2">
                                                <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"></path><path fillRule="evenodd" d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3zm-3 4a1 1 0 100 2h.01a1 1 0 100-2H7zm3 0a1 1 0 100 2h3a1 1 0 100-2h-3z" clipRule="evenodd"></path></svg>
                                                المحتوى / الوصف
                                            </h3>
                                            <p className="text-gray-700 text-sm md:text-base font-semibold leading-relaxed bg-bglight p-4 md:p-5 rounded-xl border border-gray-200 shadow-sm">{activeItem.concept}</p>
                                        </div>
                                        
                                        <div>
                                            <h3 className="text-sm md:text-base font-black text-navyLight mb-2 md:mb-3 flex items-center gap-2">
                                                <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M11.3 1.046A12.014 12.014 0 0010.3 1 12.015 12.015 0 009.29 1.046..."></path><path d="M19.342 9.406c..."></path><path fillRule="evenodd" d="M10 2a8 8 0 100 16 8 8 0 000-16zm-1 9V6a1 1 0 112 0v4h2a1 1 0 110 2h-3a1 1 0 01-1-1z" clipRule="evenodd"></path></svg>
                                                التنفيذ والأثر
                                            </h3>
                                            <p className="text-gray-700 text-sm md:text-base leading-relaxed p-1">{activeItem.application}</p>
                                        </div>
                                    </div>

                                    <div className="bg-gray-50 p-4 md:p-5 lg:p-6 border-t border-gray-200 flex flex-wrap gap-2.5 md:gap-3">
                                        {activeItem.links.map((link, i) => (
                                            <a key={i} href={link.url} target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-2 bg-white border border-gray-200 text-navy hover:bg-gold hover:text-white hover:border-gold px-3 md:px-4 py-2 md:py-2.5 rounded-lg shadow-sm text-xs md:text-sm font-bold transition-all duration-300 hover:-translate-y-0.5 hover:shadow-md">
                                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                                                {link.label}
                                            </a>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>

                        <footer className="bg-white border-t border-gray-200 p-4 md:p-5 lg:p-6 shrink-0 text-center shadow-inner mt-auto">
                            <p className="text-xs md:text-sm font-semibold text-gray-600 max-w-3xl mx-auto leading-relaxed">
                                ملف إنجاز المعلمة | إعداد: أ. ندى محمد المجيرش
                            </p>
                        </footer>

                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Portfolio />);
    </script>
</body>
